{% extends "admin/base_admin.html" %}
{% block content %}

<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<link href="https://unpkg.com/cropperjs/dist/cropper.css" rel="stylesheet">

<div class="blog-form-page">

    <!-- HEADER -->
    <div class="form-header">
        <div>
            <h2>Add New Blog</h2>
            <p>Create beautiful content for your audience.</p>
        </div>
    </div>

    <!-- FORM CARD -->
    <div class="blog-form-card">

        <form method="POST" enctype="multipart/form-data" id="blogForm">

            <!-- BASIC INFO -->
            <div class="form-grid">

                <div class="field-group">
                    <label>Blog Title</label>
                    <input
                        type="text"
                        name="title"
                        placeholder="Enter blog title"
                        required
                    >
                </div>

                <div class="field-group">
                    <label>Author Name</label>
                    <input
                        type="text"
                        name="author"
                        placeholder="Enter author name"
                    >
                </div>

            </div>

            <!-- IMAGE -->
            <div class="field-group">
                <label>Cover Image</label>

                <div class="upload-box" onclick="document.getElementById('imageInput').click()">
                    <div class="upload-content">
                        <span class="upload-icon">🖼</span>
                        <h4>Upload Blog Cover</h4>
                        <p>Click to choose image • Crop before publish</p>
                    </div>
                </div>

                <input
                    type="file"
                    id="imageInput"
                    accept="image/*"
                    hidden
                >

                <!-- preview -->
                <div class="image-preview-wrapper">
                    <img id="preview" alt="Preview">
                </div>

                <!-- cropped file -->
                <input type="file" name="image" id="croppedImage" hidden>
            </div>

            <!-- EDITOR -->
            <div class="field-group">
                <label>Blog Content</label>
                <input type="hidden" name="content" id="hiddenContent">

                <div class="editor-box">
                    <div id="editor"></div>
                </div>
            </div>

            <!-- ACTION -->
            <div class="form-actions">
                <button type="submit" class="publish-btn">
                    Publish Blog
                </button>
            </div>

        </form>

    </div>
</div>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script src="https://unpkg.com/cropperjs"></script>

<script>
const quill = new Quill('#editor', {
    theme: 'snow',
    placeholder: 'Write your blog content here...',
    modules: {
        toolbar: [
            [{ header: [1, 2, 3, false] }],
            ['bold', 'italic', 'underline'],
            [{ list: 'ordered' }, { list: 'bullet' }],
            ['link', 'image'],
            ['clean']
        ]
    }
});

let cropper;
const form = document.getElementById("blogForm");
const input = document.getElementById("imageInput");
const preview = document.getElementById("preview");
const hiddenContent = document.getElementById("hiddenContent");
const uploadBox = document.querySelector(".upload-box");

input.addEventListener("change", (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const url = URL.createObjectURL(file);

    preview.src = url;
    preview.style.display = "block";

    uploadBox.classList.add("uploaded");

    if (cropper) {
        cropper.destroy();
    }

    cropper = new Cropper(preview, {
        aspectRatio: 16 / 9,
        viewMode: 1,
        dragMode: 'move',
        autoCropArea: 1,
        responsive: true,
        background: false
    });
});

form.addEventListener("submit", function (e) {
    e.preventDefault();

    hiddenContent.value = quill.root.innerHTML;

    if (cropper) {
        cropper.getCroppedCanvas({
            width: 1600,
            height: 900
        }).toBlob((blob) => {
            const file = new File([blob], "blog-cover.jpg", {
                type: "image/jpeg"
            });

            const container = new DataTransfer();
            container.items.add(file);

            document.getElementById("croppedImage").files = container.files;

            form.submit();
        }, "image/jpeg", 0.95);
    } else {
        form.submit();
    }
});
</script>

<style>/* PAGE */
.blog-form-page {
    min-height: 100vh;
    padding: 32px;
    background: #ffffff;
}

/* HEADER */
.form-header {
    margin-bottom: 28px;
}

.form-header h2 {
    margin: 0 0 8px;
    font-size: 30px;
    font-weight: 700;
    color: #000;
}

.form-header p {
    margin: 0;
    color: #6b7280;
    font-size: 15px;
}

/* CARD */
.blog-form-card {
    background: #ffffff;
    border-radius: 18px;
    padding: 28px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    border: 1px solid #e5e7eb;
}

/* GRID */
.form-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
}

/* FIELD */
.field-group {
    margin-bottom: 24px;
}

.field-group label {
    display: block;
    margin-bottom: 8px;
    font-size: 14px;
    font-weight: 600;
    color: #374151;
}

.field-group input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid #d1d5db;
    background: #fff;
    font-size: 14px;
    outline: none;
    transition: all 0.25s ease;
    box-sizing: border-box;
    color: #111;
}

.field-group input:focus {
    border-color: #0A5C56;
    box-shadow: 0 0 0 3px rgba(10,92,86,0.12);
}

/* UPLOAD */
.upload-box {
    width: 100%;
    min-height: 160px;
    border-radius: 16px;
    background: #f9fafb;
    border: 2px dashed #d1d5db;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    transition: 0.25s;
}

.upload-box:hover {
    border-color: #0A5C56;
    background: #f3f4f6;
}

.upload-box.uploaded {
    border-color: #0A5C56;
}

.upload-content {
    text-align: center;
}

.upload-icon {
    font-size: 38px;
    margin-bottom: 10px;
}

.upload-content h4 {
    margin: 0 0 4px;
    font-size: 16px;
    color: #111;
}

.upload-content p {
    margin: 0;
    color: #6b7280;
    font-size: 13px;
}

/* PREVIEW */
.image-preview-wrapper {
    margin-top: 18px;
    border-radius: 16px;
    overflow: hidden;
    background: #f9fafb;
    border: 1px solid #e5e7eb;
}

#preview {
    width: 100%;
    max-height: 420px;
    object-fit: contain;
    display: none;
}

/* EDITOR */
.editor-box {
    border-radius: 14px;
    overflow: hidden;
    background: #ffffff;
    border: 1px solid #e5e7eb;
}

/* Toolbar */
.ql-toolbar {
    background: #f9fafb;
}

/* Editor */
#editor {
    min-height: 380px;
    font-size: 15px;
}

.ql-editor {
    color: #111 !important;
    background: #fff;
    line-height: 1.6;
}

/* Placeholder */
.ql-editor.ql-blank::before {
    color: #9ca3af !important;
}

/* Toolbar icons */
.ql-toolbar button svg {
    color: #111;
}

/* ACTION */
.form-actions {
    margin-top: 20px;
    display: flex;
    justify-content: flex-end;
}

/* 🔥 BUTTON */
.publish-btn {
    border: none;
    padding: 14px 28px;
    border-radius: 12px;
    background: linear-gradient(135deg, #0A5C56, #083E3A);
    color: white;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

.publish-btn:hover {
    transform: translateY(-2px);
    opacity: 0.9;
}

/* MOBILE */
@media (max-width: 768px) {

    .blog-form-page {
        padding: 16px;
    }

    .blog-form-card {
        padding: 18px;
    }

    .form-grid {
        grid-template-columns: 1fr;
        gap: 0;
    }

    .form-header h2 {
        font-size: 24px;
    }

    #editor {
        min-height: 260px;
    }

    .form-actions {
        justify-content: stretch;
    }

    .publish-btn {
        width: 100%;
    }
}
</style>

{% endblock %}

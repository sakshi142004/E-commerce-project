{% extends "admin/base_admin.html" %}
{% block content %}

<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<link href="https://unpkg.com/cropperjs/dist/cropper.css" rel="stylesheet">

<div class="blog-form-page">

    <!-- HEADER -->
    <div class="form-header">
        <div>
            <h2>Add New Blog</h2>
            <p>Create beautiful content for your audience.</p>
        </div>
    </div>

    <!-- FORM CARD -->
    <div class="blog-form-card">

        <form method="POST" enctype="multipart/form-data" id="blogForm">

            <!-- BASIC INFO -->
            <div class="form-grid">

                <div class="field-group">
                    <label>Blog Title</label>
                    <input
                        type="text"
                        name="title"
                        placeholder="Enter blog title"
                        required
                    >
                </div>

                <div class="field-group">
                    <label>Author Name</label>
                    <input
                        type="text"
                        name="author"
                        placeholder="Enter author name"
                    >
                </div>

            </div>

            <!-- IMAGE -->
            <div class="field-group">
                <label>Cover Image</label>

                <div class="upload-box" onclick="document.getElementById('imageInput').click()">
                    <div class="upload-content">
                        <span class="upload-icon">🖼</span>
                        <h4>Upload Blog Cover</h4>
                        <p>Click to choose image • Crop before publish</p>
                    </div>
                </div>

                <input
                    type="file"
                    id="imageInput"
                    accept="image/*"
                    hidden
                >

                <!-- preview -->
                <div class="image-preview-wrapper">
                    <img id="preview" alt="Preview">
                </div>

                <!-- cropped file -->
                <input type="file" name="image" id="croppedImage" hidden>
            </div>

            <!-- EDITOR -->
            <div class="field-group">
                <label>Blog Content</label>
                <input type="hidden" name="content" id="hiddenContent">

                <div class="editor-box">
                    <div id="editor"></div>
                </div>
            </div>

            <!-- ACTION -->
            <div class="form-actions">
                <button type="submit" class="publish-btn">
                    Publish Blog
                </button>
            </div>

        </form>

    </div>
</div>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script src="https://unpkg.com/cropperjs"></script>

<script>
const quill = new Quill('#editor', {
    theme: 'snow',
    placeholder: 'Write your blog content here...',
    modules: {
        toolbar: [
            [{ header: [1, 2, 3, false] }],
            ['bold', 'italic', 'underline'],
            [{ list: 'ordered' }, { list: 'bullet' }],
            ['link', 'image'],
            ['clean']
        ]
    }
});

let cropper;
const form = document.getElementById("blogForm");
const input = document.getElementById("imageInput");
const preview = document.getElementById("preview");
const hiddenContent = document.getElementById("hiddenContent");
const uploadBox = document.querySelector(".upload-box");

input.addEventListener("change", (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const url = URL.createObjectURL(file);

    preview.src = url;
    preview.style.display = "block";

    uploadBox.classList.add("uploaded");

    if (cropper) {
        cropper.destroy();
    }

    cropper = new Cropper(preview, {
        aspectRatio: 16 / 9,
        viewMode: 1,
        dragMode: 'move',
        autoCropArea: 1,
        responsive: true,
        background: false
    });
});

form.addEventListener("submit", function (e) {
    e.preventDefault();

    hiddenContent.value = quill.root.innerHTML;

    if (cropper) {
        cropper.getCroppedCanvas({
            width: 1600,
            height: 900
        }).toBlob((blob) => {
            const file = new File([blob], "blog-cover.jpg", {
                type: "image/jpeg"
            });

            const container = new DataTransfer();
            container.items.add(file);

            document.getElementById("croppedImage").files = container.files;

            form.submit();
        }, "image/jpeg", 0.95);
    } else {
        form.submit();
    }
});
</script>

<style>
.blog-form-page {
    min-height: 100vh;
    padding: 32px;
    background:linear-gradient(135deg, #083E3A, #0A5C56 60%, #0f766e);
}

/* HEADER */
.form-header {
    margin-bottom: 28px;
}

.form-header h2 {
    margin: 0 0 8px;
    font-size: 30px;
    font-weight: 700;
    color:#fff;
}

.form-header p {
    margin: 0;
    color:rgba(255,255,255,0.7);
    font-size: 15px;
}

/* CARD */
.blog-form-card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(18px);
    border-radius: 24px;
    padding: 28px;
    box-shadow: 0 18px 40px rgba(0,0,0,0.08);
    border: 1px solid rgba(255,255,255,0.15);
}

/* GRID */
.form-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
}

/* FIELD */
.field-group {
    margin-bottom: 26px;
}

.field-group label {
    display: block;
    margin-bottom: 10px;
    font-size: 15px;
    font-weight: 700;
    color: rgba(255,255,255,0.8);
}

.field-group input {
    width: 100%;
    padding: 15px 18px;
    border-radius: 16px;
    border:  1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08);
    font-size: 15px;
    outline: none;
    transition: all 0.3s ease;
    box-sizing: border-box;
    color: #fff;
}

.field-group input:focus {
    border-color: #0A5C56;
    box-shadow: 0 0 0 4px rgba(17,17,17,0.05);
}

/* UPLOAD */
.upload-box {
    width: 100%;
    min-height: 180px;
    border-radius: 24px;
   background: rgba(255,255,255,0.05);
    border: 2px dashed rgba(255,255,255,0.2);
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    transition: all 0.3s ease;
}

.upload-box:hover {
    border-color: #111;
    transform: translateY(-2px);
}

.upload-box.uploaded {
    border-color: #111;
}

.upload-content {
    text-align: center;
}

.upload-icon {
    font-size: 42px;
    display: block;
    margin-bottom: 12px;
}

.upload-content h4 {
    margin: 0 0 6px;
    font-size: 20px;
    color:rgba(255,255,255,0.8);
}

.upload-content p {
    margin: 0;
    color:rgba(255,255,255,0.8);
    font-size: 14px;
}

/* PREVIEW */
.image-preview-wrapper {
    margin-top: 22px;
    border-radius: 24px;
    overflow: hidden;
    background: rgba(255,255,255,0.05);
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.04);
}

#preview {
    width: 100%;
    max-height: 520px;
    object-fit: contain;
    display: none;
}

/* EDITOR */
.editor-box {
    border-radius: 20px;
    overflow: hidden;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.02);
}
.ql-toolbar {
    background: rgba(255,255,255,0.08);
}

#editor {
    min-height: 420px;
    font-size: 16px;
}
/* Quill editor text fix */
.ql-editor {
    min-height: 420px;
    color: #fff !important;
    background: transparent;
    font-size: 16px;
    line-height: 1.7;
  
}
.ql-toolbar button svg {
    color: #111;
}
.ql-editor.ql-blank::before {
    color: #999 !important;
    font-style: normal;
}
.ql-toolbar.ql-snow {
    border: none;
    border-bottom: 1px solid #ececec;
    background: #fafafa;
}

.ql-container.ql-snow {
    border: none;
}

/* ACTION */
.form-actions {
    margin-top: 20px;
    display: flex;
    justify-content: flex-end;
}

.publish-btn {
    border: none;
    padding: 16px 34px;
    border-radius: 18px;
background:  linear-gradient(135deg, #00c6b2, #0A5C56);
    color: white;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 12px 24px rgba(0,0,0,0.12);
}

.publish-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 18px 34px rgba(0,0,0,0.18);
}

/* MOBILE */
@media (max-width: 768px) {
    .blog-form-page {
        padding: 18px;
    }

    .blog-form-card {
        padding: 20px;
        border-radius: 22px;
    }

    .form-grid {
        grid-template-columns: 1fr;
        gap: 0;
    }

    .form-header h2 {
        font-size: 28px;
    }

    #editor {
        min-height: 300px;
    }

    .form-actions {
        justify-content: stretch;
    }

    .publish-btn {
        width: 100%;
    }
}
</style>

{% endblock %}

{% extends "admin/base_admin.html" %}
{% block content %}

<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css"/>

<div class="blog-form-page">

    <!-- HEADER -->
    <div class="form-header">
        <div>
            <h2>Add New Blog</h2>
            <p>Create beautiful content for your audience.</p>
        </div>
    </div>

    <!-- FORM CARD -->
    <div class="blog-form-card">

        <form method="POST" enctype="multipart/form-data" id="blogForm">

            <!-- BASIC INFO -->
            <div class="form-grid">

                <div class="field-group">
                    <label>Blog Title</label>
                    <input
                        type="text"
                        name="title"
                        placeholder="Enter blog title"
                        required
                    >
                </div>

                <div class="field-group">
                    <label>Author Name</label>
                    <input
                        type="text"
                        name="author"
                        placeholder="Enter author name"
                    >
                </div>

            </div>

            <!-- IMAGE -->
            <div class="field-group">
                <label>Cover Image</label>

                <div class="upload-box" onclick="document.getElementById('imageInput').click()">
                    <div class="upload-content">
                        <span class="upload-icon"><i class="fa-solid fa-image"></i></span>
                        <h4>Upload Blog Cover</h4>
                        <p>Click to choose image &bull; Crop before publish</p>
                    </div>
                </div>

                <input
                    type="file"
                    id="imageInput"
                    accept="image/*"
                    hidden
                >

                <!-- preview -->
                <div class="image-preview-wrapper">
                    <img id="preview" alt="Preview">
                </div>

                <!-- cropped file -->
                <input type="file" name="cover_image_cropped" id="croppedImage" hidden>
            </div>

            <!-- EDITOR -->
            <div class="field-group">
                <label>Blog Content</label>
                <input type="hidden" name="content" id="hiddenContent">

                <div class="editor-box">
                    <div id="editor"></div>
                </div>
            </div>

            <!-- ACTION -->
            <div class="form-actions">
                <button type="submit" class="publish-btn">
                    Publish Blog
                </button>
            </div>

        </form>

    </div>
</div>

<!-- Crop Modal -->
<div id="cropModal" class="crop-modal">
    <div class="crop-box">
        <h3>Crop Image (Square)</h3>

        <div class="crop-image-shell">
            <img id="cropImage" style="max-width:100%;">
        </div>

        <div class="crop-actions">
            <button type="button" onclick="closeCrop()">Cancel</button>
            <button type="button" onclick="applyCrop()">Crop &amp; Use</button>
        </div>
    </div>
</div>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>

<script>
const quill = new Quill('#editor', {
    theme: 'snow',
    placeholder: 'Write your blog content here...',
    modules: {
        toolbar: [
            [{ header: [1, 2, 3, false] }],
            ['bold', 'italic', 'underline'],
            [{ list: 'ordered' }, { list: 'bullet' }],
            ['link', 'image'],
            ['clean']
        ]
    }
});

let cropper;
let currentFile = null;
const form = document.getElementById("blogForm");
const input = document.getElementById("imageInput");
const preview = document.getElementById("preview");
const croppedImage = document.getElementById("croppedImage");
const cropModal = document.getElementById("cropModal");
const cropImage = document.getElementById("cropImage");
const hiddenContent = document.getElementById("hiddenContent");
const uploadBox = document.querySelector(".upload-box");

input.addEventListener("change", (e) => {
    const file = e.target.files[0];
    if (!file) return;

    currentFile = file;
    openCropper();
});

function openCropper() {
    const file = currentFile;
    const reader = new FileReader();

    reader.onload = function(e) {
        cropImage.src = e.target.result;
        cropModal.style.display = "flex";

        cropImage.onload = function() {
            if (cropper) cropper.destroy();

            cropper = new Cropper(cropImage, {
                aspectRatio: 1,
                viewMode: 1,
                dragMode: "move",
                movable: true,
                zoomable: true,
                scalable: true,
                cropBoxMovable: true,
                cropBoxResizable: true,
                autoCropArea: 0.9,
                background: false,
                responsive: true
            });
        };
    };

    reader.readAsDataURL(file);
}

function applyCrop() {
    if (!cropper) return;

    const canvas = cropper.getCroppedCanvas({
        width: 800,
        height: 800
    });

    canvas.toBlob(function(blob) {
        const file = new File([blob], "blog-cover.jpg", { type: "image/jpeg" });
        const dataTransfer = new DataTransfer();
        dataTransfer.items.add(file);
        croppedImage.files = dataTransfer.files;

        preview.src = URL.createObjectURL(file);
        preview.style.display = "block";
        uploadBox.classList.add("uploaded");

        closeCrop();
    }, "image/jpeg", 0.95);
}

function closeCrop() {
    cropModal.style.display = "none";

    if (cropper) {
        cropper.destroy();
        cropper = null;
    }
}

form.addEventListener("submit", function (e) {
    e.preventDefault();

    hiddenContent.value = quill.root.innerHTML;

    if (input.files.length && !croppedImage.files.length) {
        alert("Please crop the selected cover image before publishing.");
        return;
    }

    form.submit();
});
</script>

<style>/* PAGE */
.crop-box {
    width: 90%;
    max-width: 650px;
    background: #ffffff;
    border-radius: 16px;
    padding: 24px;
    border: 1px solid #e5e7eb;
}

#cropImage {
    max-width: 100%;
    display: block;
}

.crop-image-shell {
    width: 100%;
    height: 300px;
}

.crop-actions {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    margin-top: 15px;
    position: relative;
    z-index: 10;
}

.crop-actions button {
    padding: 12px 18px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #0A5C56, #083E3A);
    color: #fff;
    cursor: pointer;
}

.crop-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 9999;
    justify-content: center;
    align-items: center;
}

.crop-box h3 {
    color: #111;
    margin-bottom: 15px;
}

.blog-form-page {
    min-height: 100vh;
    padding: 32px;
    background: #ffffff;
}

/* HEADER */
.form-header {
    margin-bottom: 28px;
}

.form-header h2 {
    margin: 0 0 8px;
    font-size: 30px;
    font-weight: 400;
    color: #000;
}

.form-header p {
    margin: 0;
    color: #6b7280;
    font-size: 15px;
}

/* CARD */
.blog-form-card {
    background: #ffffff;
    border-radius: 18px;
    padding: 28px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    border: 1px solid #e5e7eb;
}

/* GRID */
.form-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
}

/* FIELD */
.field-group {
    margin-bottom: 24px;
}

.field-group label {
    display: block;
    margin-bottom: 8px;
    font-size: 14px;
    font-weight: 400;
    color: #374151;
}

.field-group input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid #d1d5db;
    background: #fff;
    font-size: 14px;
    outline: none;
    transition: all 0.25s ease;
    box-sizing: border-box;
    color: #111;
}

.field-group input:focus {
    border-color: #0A5C56;
    box-shadow: 0 0 0 3px rgba(10,92,86,0.12);
}

/* UPLOAD */
.upload-box {
    width: 100%;
    min-height: 160px;
    border-radius: 16px;
    background: #f9fafb;
    border: 2px dashed #d1d5db;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    transition: 0.25s;
}

.upload-box:hover {
    border-color: #0A5C56;
    background: #f3f4f6;
}

.upload-box.uploaded {
    border-color: #0A5C56;
}

.upload-content {
    text-align: center;
}

.upload-icon {
    font-size: 38px;
    margin-bottom: 10px;
}

.upload-content h4 {
    margin: 0 0 4px;
    font-size: 16px;
    color: #111;
}

.upload-content p {
    margin: 0;
    color: #6b7280;
    font-size: 13px;
}

/* PREVIEW */
.image-preview-wrapper {
    margin-top: 18px;
    border-radius: 16px;
    overflow: hidden;
    background: #f9fafb;
    border: 1px solid #e5e7eb;
}

#preview {
    width: 100%;
    max-height: 420px;
    object-fit: contain;
    display: none;
}

/* EDITOR */
.editor-box {
    border-radius: 14px;
    overflow: hidden;
    background: #ffffff;
    border: 1px solid #e5e7eb;
}

/* Toolbar */
.ql-toolbar {
    background: #f9fafb;
}

/* Editor */
#editor {
    min-height: 380px;
    font-size: 15px;
}

.ql-editor {
    color: #111 !important;
    background: #fff;
    line-height: 1.6;
}

/* Placeholder */
.ql-editor.ql-blank::before {
    color: #9ca3af !important;
}

/* Toolbar icons */
.ql-toolbar button svg {
    color: #111;
}

/* ACTION */
.form-actions {
    margin-top: 20px;
    display: flex;
    justify-content: flex-end;
}

/* BUTTON */
.publish-btn {
    border: none;
    padding: 14px 28px;
    border-radius: 12px;
    background: linear-gradient(135deg, #0A5C56, #083E3A);
    color: white;
    font-size: 14px;
    font-weight: 400;
    cursor: pointer;
    transition: 0.3s;
}

.publish-btn:hover {
    transform: translateY(-2px);
    opacity: 0.9;
}

/* MOBILE */
@media (max-width: 768px) {

    .blog-form-page {
        padding: 0 8px 10px !important;
    }

    .form-header {
        margin-bottom: 8px !important;
    }

    .form-header h2 {
        font-size: 20px !important;
        line-height: 1.15 !important;
        margin: 0 0 3px !important;
    }

    .form-header p {
        font-size: 11.5px !important;
        line-height: 1.35 !important;
        margin: 0 !important;
    }

    .blog-form-card {
        padding: 12px !important;
        margin: 0 !important;
        border-radius: 12px !important;
        box-shadow: 0 4px 14px rgba(0,0,0,0.04) !important;
    }

    .form-grid {
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) !important;
        gap: 8px !important;
    }

    .field-group {
        margin-bottom: 12px !important;
        min-width: 0;
    }

    .field-group label {
        font-size: 11.5px !important;
        line-height: 1.25 !important;
        margin-bottom: 4px !important;
    }

    .field-group input {
        min-height: 34px !important;
        padding: 7px 8px !important;
        border-radius: 8px !important;
        font-size: 11.5px !important;
        line-height: 1.25 !important;
    }

    .upload-box {
        min-height: 82px !important;
        padding: 12px !important;
        border-radius: 10px !important;
    }

    .upload-icon {
        font-size: 22px !important;
        margin-bottom: 5px !important;
    }

    .upload-content h4 {
        font-size: 12.5px !important;
        line-height: 1.2 !important;
        margin-bottom: 3px !important;
    }

    .upload-content p {
        font-size: 10.5px !important;
        line-height: 1.3 !important;
    }

    .image-preview-wrapper {
        margin-top: 9px !important;
        border-radius: 10px !important;
    }

    #preview {
        max-height: 150px !important;
        aspect-ratio: 16 / 9;
        object-fit: cover !important;
    }

    .editor-box {
        border-radius: 10px !important;
    }

    .ql-toolbar.ql-snow {
        padding: 5px !important;
    }

    .ql-toolbar.ql-snow .ql-formats {
        margin-right: 4px !important;
    }

    #editor {
        min-height: 180px !important;
        font-size: 12px !important;
    }

    .ql-editor {
        padding: 10px !important;
        font-size: 12px !important;
        line-height: 1.45 !important;
    }

    .form-actions {
        justify-content: stretch;
        margin-top: 10px !important;
        gap: 8px !important;
    }

    .publish-btn {
        width: 100%;
        min-height: 36px !important;
        padding: 9px 12px !important;
        border-radius: 9px !important;
        font-size: 12px !important;
        line-height: 1.2 !important;
        box-shadow: none !important;
    }

    .crop-box {
        width: calc(100vw - 24px) !important;
        padding: 12px !important;
        border-radius: 12px !important;
    }

    .crop-box h3 {
        font-size: 15px !important;
        margin-bottom: 8px !important;
    }

    .crop-image-shell {
        height: 220px !important;
    }

    .crop-actions {
        gap: 8px !important;
    }

    .crop-actions button {
        padding: 8px 10px !important;
        border-radius: 8px !important;
        font-size: 12px !important;
    }
}

@media (max-width: 380px) {
    .form-grid {
        grid-template-columns: 1fr !important;
    }
}
</style>

{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
    --sidebar-width: 270px;

    /* ✅ LIGHT THEME */
    --bg-primary: #ffffff;
    --bg-secondary: #f8fafc;

    --card-bg: #ffffff;
    --card-border: #e5e7eb;

    --text-primary: #111111;
    --text-secondary: #6b7280;

    /* ✅ BRAND COLOR */
    --accent: #0A5C56;
    --accent-gradient: linear-gradient(135deg, #0A5C56, #083E3A);

    --line: #e5e7eb;

    --shadow: 0 10px 30px rgba(0,0,0,0.08);
}
h1, h2, h3, h4, h5, h6 {
    color: #000;
}
* {
    margin: 0;
    padding: 0;
    letter-spacing: 0.2px;
    box-sizing: border-box;
    font-family: 'Poppins', 'Inter', sans-serif;
}
html, body {
    background: #ffffff;
    color: var(--text-primary);
}
.dashboard-header {
    background:#ffffff;
    backdrop-filter: blur(14px);
     border: 1px solid #e5e7eb;
    padding: 12px 16px;
    border-radius: 14px;
}
.detail-view {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
}
.card {
    padding: 22px;
    border-radius: 16px;
    background: #ffffff;
    border: 1px solid #e5e7eb;
    color: #111;
    box-shadow: 0 6px 20px rgba(0,0,0,0.06);
}
.back-btn{
    display: none;
}
@media (max-width: 768px) {

    .cards {
        grid-template-columns: 1fr;
        gap: 14px;
    }

    .card {
        padding: 16px;
    }

    .dashboard-header {
        position: sticky;
        top: 10px;
        z-index: 50;
    }

    
   .back-btn {
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 300;
    display: none;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    border: none;
    padding: 10px 14px;
    border-radius: 10px;
    color: white;
    font-size: 18px;
}


/* jab active ho tab show */
.back-btn.show {
    display: inline-block;
}
}

/* Loader */


@keyframes logoZoomBlur {
    0% {
        transform: scale(0.4);
        filter: blur(0);
        opacity: 0;
    }
    35% {
        transform: scale(1.5);
        opacity: 1;
    }
    70% {
        transform: scale(2.8);
        opacity: 1;
    }
    100% {
        transform: scale(3.2);
        filter: blur(6px);
        opacity: 0;
    }
}


/* Sidebar */
.sidebar {
    width: var(--sidebar-width);
    height: calc(100vh - 24px);
    position: fixed;
    top: 12px;
    left: 12px;
    background:#ffffff;
    backdrop-filter: blur(20px);
    border: 1px solid #e5e7eb;
    border-radius: 28px;
     box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    padding: 24px 18px;
    display: flex;
    flex-direction: column;
    z-index: 100;
}
.sidebar a {
    text-decoration: none;
    color: #444;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 15px 16px;
    border-radius: 18px;
    font-size: 15px;
    font-weight: 600;
    transition: all 0.3s ease;
}

.sidebar a:hover {
    background: #f3f4f6;
    color: #000;
    transform: translateX(4px);
}

.sidebar a.active {
  background: linear-gradient(135deg, #0A5C56, #083E3A);
    color: #fff;
    box-shadow: 0 12px 24px rgba(255,255,255,0.12);
}

/* Brand */
.brand {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 8px 10px 24px;
    border-bottom: 1px solid rgba(229, 231, 235, 0.8);
    margin-bottom: 18px;
}

.brand img {
    width: 42px;
    height: 42px;
    object-fit: contain;
    border-radius: 14px;
    background: #fff;
    padding: 4px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.06);
}

.brand-text h2 {
    font-size: 20px;
    color: var(--text-primary);
    margin-bottom: 2px;
    font-weight: 700;
}

.brand-text p {
    font-size: 12px;
    color: var(--text-secondary);
}

/* Navigation */
.nav-links {
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
}




.sidebar a span.icon {
    font-size: 18px;
    width: 20px;
    text-align: center;
}

/* Logout */
.logout-wrap {
    padding-top: 18px;
    border-top: 1px solid rgba(229, 231, 235, 0.8);
}

.logout-link {
    background: linear-gradient(135deg, #111, #333);
    color: white !important;
    box-shadow: 0 12px 24px rgba(17,17,17,0.16);
}

.logout-link:hover {
    transform: translateY(-2px) !important;
    color: white !important;
}

/* Main */
.main {
    margin-left: calc(var(--sidebar-width) + 36px);
    width: calc(100% - var(--sidebar-width) - 48px);
    min-height: 100vh;
    padding: 32px;
}

/* Mobile menu */
.mobile-toggle {
    display: none !important;
}

@media (max-width: 1024px) {

    .menu-btn {
        display: flex;
        align-items: center;
        justify-content: center;

        position: fixed;
        top: 14px;
        left: 14px;
        z-index: 1500;

        width: 50px;
        height: 50px;

        font-size: 26px;
        font-weight: 600;

        color: #fff;

        border: none;
        border-radius: 16px;

        background: linear-gradient(135deg, rgba(10,92,86,0.8), rgba(8,62,58,0.9));
        backdrop-filter: blur(14px);

        box-shadow:
            0 10px 25px rgba(0,0,0,0.5),
            inset 0 1px 0 rgba(255,255,255,0.15);

        cursor: pointer;
        transition: all 0.25s ease;
    }

    .menu-btn:hover {
        transform: scale(1.08);
        box-shadow:
            0 12px 30px rgba(0,0,0,0.6),
            inset 0 1px 0 rgba(255,255,255,0.2);
    }

    .menu-btn:active {
        transform: scale(0.92);
    }
}
@media (max-width: 1024px) {

    .sidebar {
        position: fixed;
        top: 0;
        left: 0;

        width: 260px; /* 🔥 full screen nahi, clean panel */
        height: 100%;

        transform: translateX(-100%);
        transition: transform 0.3s ease;

        z-index: 1200; /* 🔥 important */
    }

    .sidebar.open {
        transform: translateX(0);
    }

    .main {
        margin-left: 0;
        width: 100%;
        padding: 70px 16px 16px;
    }
}
@media (max-width: 1024px) {

    .sidebar::after {
        content: "";
        position: fixed;
        top: 0;
        left: 260px;
        width: 100vw;
        height: 100vh;
        background: rgba(0,0,0,0.4);
        backdrop-filter: blur(3px);
        opacity: 0;
        pointer-events: none;
        transition: 0.3s;
    }

    .sidebar.open::after {
        opacity: 1;
        pointer-events: auto;
    }
}

@media (min-width: 1025px) {
    .menu-btn {
        display: none !important;
    }
}
</style>
</head>

<body>
<button class="menu-btn" onclick="toggleSidebar()">☰</button>


<button class="back-btn" onclick="history.back()">←</button>
<!-- Sidebar -->
<div class="sidebar" id="sidebar">

    <div class="brand">
        <img src="static\images\bp_logo-white.png" alt="Logo">
        <div class="brand-text">
            <h2>Admin</h2>
            <p>Control Center</p>
        </div>
    </div>

    <div class="nav-links">
        <a href="/secure-admin-portal-9821">
            <span class="icon">📊</span>
            Dashboard
        </a>

        <a href="/admin/products">
            <span class="icon">🛍️</span>
            Products
        </a>

        <a href="/admin/orders">
            <span class="icon">📦</span>
            Orders
        </a>

        <a href="/admin/users">
            <span class="icon">👥</span>
            Users
        </a>

        <a href="/admin/blogs">
            <span class="icon">📝</span>
            Blog
        </a>
       <a href="/admin/admins">
    <span class="icon">👑</span>
    Admins
</a>
        <a href="/admin/settings">
    <span class="icon">⚙️</span>
    Settings
</a>
      
    </div>

    <div class="logout-wrap">
        <a href="/admin-logout" class="logout-link">
            <span class="icon">🚪</span>
            Logout
        </a>
    </div>

</div>

<!-- Main Content -->
<div class="main">
    {% block content %}{% endblock %}
</div>

<script>
    const sidebar = document.querySelector(".sidebar");
const main = document.querySelector(".main");
const backBtn = document.querySelector(".back-btn");


/* BACK BUTTON */
function toggleSidebar() {
    const sidebar = document.getElementById("sidebar");
    sidebar.classList.toggle("open");
}

document.querySelectorAll(".sidebar a").forEach(link => {
    link.addEventListener("click", () => {
        document.getElementById("sidebar").classList.remove("open");
    });
});
document.querySelectorAll(".sidebar a").forEach(link => {
    link.addEventListener("click", () => {
        const sidebar = document.getElementById("sidebar");
        const menuBtn = document.querySelector(".menu-btn");

        sidebar.classList.remove("open");
   
    });
});





/* Active nav link */
const currentPath = window.location.pathname;
document.querySelectorAll(".sidebar a").forEach(link => {
    if (link.getAttribute("href") === currentPath) {
        link.classList.add("active");
    }
});




</script>

</body>
</html>

{% extends "admin/base_admin.html" %}
{% block content %}

<div class="dashboard">

    <!-- HEADER -->
    <div class="dashboard-header">
        
        <div>
            <h1 id="pageTitle">Dashboard</h1>
            <p id="pageSub">Monitor users, orders, and products.</p>
        </div>
    </div>

    <!-- LIST VIEW -->
    <div class="cards" id="dashboardList">

        <div class="card" onclick="openSection('Users')">
            <h3>Users</h3>
            <span>{{ users }}</span>
        </div>

        <div class="card" onclick="openSection('Orders')">
            <h3>Orders</h3>
            <span>{{ orders }}</span>
        </div>

        <div class="card" onclick="openSection('Products')">
            <h3>Products</h3>
            <span>{{ products }}</span>
        </div>

    </div>

    <!-- DETAIL VIEW -->
    <div class="detail-view" id="detailView">
        <h2 id="detailTitle"></h2>
        <p>This is your <span id="detailName"></span> section.</p>
    </div>

</div>

<style>
/* BACKGROUND */
/* BACKGROUND */
body {
    background: #ffffff;
    color: #111;
}

/* HEADER */
.dashboard-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
}

/* BACK BUTTON */
.back-btn {
    display: none;
    border: none;
    background: #f3f4f6;
    color: #111;
    font-size: 18px;
    padding: 8px 12px;
    border-radius: 10px;
    cursor: pointer;
}

/* TITLE */
.dashboard-header h1 {
    font-size: 28px;
    color: #000;
}

.dashboard-header p {
    color: #6b7280;
    font-size: 14px;
}

/* CARDS GRID */
.cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
}

/* CARD (CLEAN WHITE) */
.card {
    padding: 22px;
    border-radius: 16px;
    background: #ffffff;
    border: 1px solid #e5e7eb;
    color: #111;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 6px 20px rgba(0,0,0,0.05);
}

.card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 30px rgba(0,0,0,0.08);
}

/* CARD TEXT */
.card h3 {
    font-size: 14px;
    color: #6b7280;
}

.card span {
    font-size: 30px;
    font-weight: 400;
    color: #000;
}

/* DETAIL VIEW */
.detail-view {
    display: none;
    margin-top: 20px;
    padding: 20px;
    border-radius: 16px;
    background: #ffffff;
    border: 1px solid #e5e7eb;
    color: #111;
    box-shadow: 0 6px 20px rgba(0,0,0,0.05);
}

/* 🔥 BUTTONS (GLOBAL FIX) */
button,
.btn {
    background: linear-gradient(135deg, #0A5C56, #083E3A);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 10px 14px;
    font-weight: 400;
    cursor: pointer;
    transition: 0.3s;
}

button:hover,
.btn:hover {
    transform: translateY(-2px);
    opacity: 0.9;
}

/* MOBILE */
@media (max-width: 768px) {

    .cards {
        grid-template-columns: 1fr;
        gap: 14px;
    }

    .card {
        padding: 16px;
    }

    .dashboard-header {
        position: sticky;
        top: 10px;
        z-index: 50;
        background: #fff;
    }

    .back-btn {
        position: fixed;
        top: 16px;
        left: 16px;
        z-index: 300;
        display: none;
        background: #f3f4f6;
        color: #111;
        border-radius: 10px;
        font-size: 18px;
    }
}

/* TABLET FIX */
@media (max-width: 1024px) {

    .main {
        display: block;
    }

    .sidebar.hide {
        display: none;
    }
}
</style>



{% endblock %}

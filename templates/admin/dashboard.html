{% extends "admin/base_admin.html" %}
{% block content %}

<div class="dashboard">

    <!-- HEADER -->
    <div class="dashboard-header">
        
        <div>
            <h1 id="pageTitle">Dashboard</h1>
            <p id="pageSub">Monitor users, orders, and products.</p>
        </div>
    </div>

    <!-- LIST VIEW -->
    <div class="cards" id="dashboardList">

        <div class="card" onclick="openSection('Users')">
            <h3>Users</h3>
            <span>{{ users }}</span>
        </div>

        <div class="card" onclick="openSection('Orders')">
            <h3>Orders</h3>
            <span>{{ orders }}</span>
        </div>

        <div class="card" onclick="openSection('Products')">
            <h3>Products</h3>
            <span>{{ products }}</span>
        </div>

    </div>

    <!-- DETAIL VIEW -->
    <div class="detail-view" id="detailView">
        <h2 id="detailTitle"></h2>
        <p>This is your <span id="detailName"></span> section.</p>
    </div>

</div>

<style>
/* BACKGROUND */
body {
    background: linear-gradient(135deg, #062f2c, #041f1d);
}

/* HEADER */
.dashboard-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
}

.back-btn {
    display: none;
    border: none;
    background: rgba(255,255,255,0.1);
    color: white;
    font-size: 18px;
    padding: 8px 12px;
    border-radius: 10px;
    cursor: pointer;
}

/* TITLE */
.dashboard-header h1 {
    font-size: 28px;
    color: white;
}

.dashboard-header p {
    color: #bdbdbd;
    font-size: 14px;
}

/* CARDS */
.cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
}

/* GLASS CARD */
.card {
    padding: 24px;
    border-radius: 20px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(14px);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
    background: rgba(255,255,255,0.12);
}

.card h3 {
    font-size: 14px;
    color: #dcdcdc;
}

.card span {
    font-size: 32px;
    font-weight: 700;
}

/* DETAIL VIEW */
.detail-view {
    display: none;
    margin-top: 20px;
    padding: 20px;
    border-radius: 18px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(14px);
    color: white;
}

/* MOBILE */
@media (max-width: 768px) {

    .cards {
        grid-template-columns: 1fr;
        gap: 14px;
    }

    .card {
        padding: 16px;
    }

    .dashboard-header {
        position: sticky;
        top: 10px;
        z-index: 50;
    }

   .back-btn {
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 300;
    display: none;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    border: none;
    padding: 10px 14px;
    border-radius: 10px;
    color: white;
    font-size: 18px;
}
}

@media (max-width: 1024px) {

    .main {
        display: block;
    }

    .main.active {
        display: block;
    }

    .sidebar.hide {
        display: none;
    }
}
</style>



{% endblock %}

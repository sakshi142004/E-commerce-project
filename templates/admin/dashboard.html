<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    display: flex;
}

/* Sidebar */
.sidebar {
    width: 220px;
    height: 100vh;
    background: #111;
    color: white;
    padding: 20px;
}

.sidebar h2 {
    color: gold;
}

.sidebar a {
    display: block;
    color: white;
    padding: 10px;
    margin: 10px 0;
    text-decoration: none;
    border-radius: 6px;
}

.sidebar a:hover {
    background: gold;
    color: black;
}

/* Main */
.main {
    flex: 1;
    padding: 30px;
    background: #f5f5f5;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    margin: 10px;
    display: inline-block;
    width: 200px;
    text-align: center;
    box-shadow: 0 5px 10px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>Admin 👑</h2>

    <a href="#">Dashboard</a>
    <a href="#">Products</a>
    <a href="#">Orders</a>
    <a href="#">Users</a>
    <a href="#">Blog</a>
    <a href="/admin-logout">Logout</a>
</div>

<div class="main">
    <h1>Dashboard</h1>

    <div class="card">Users: 120</div>
    <div class="card">Orders: 45</div>
    <div class="card">Revenue: ₹50000</div>
</div>

</body>
</html>

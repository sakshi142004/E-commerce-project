{% extends "admin/base_admin.html" %}
{% block content %}

<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css"/>

<div class="blog-edit-page">

    <!-- Header -->
    <div class="edit-header">
        <div>
            <h2>Edit Blog</h2>
            <p>Refine your content with a polished publishing experience.</p>
        </div>
    </div>

    <!-- Card -->
    <div class="edit-card">

        <form method="POST" enctype="multipart/form-data" id="editBlogForm">

            <!-- Basic Fields -->
            <div class="form-grid">

                <div class="field-group">
                    <label>Blog Title</label>
                    <input
                        type="text"
                        name="title"
                        value="{{ blog.title }}"
                        placeholder="Enter blog title"
                        required
                    >
                </div>

                <div class="field-group">
                    <label>Author Name</label>
                    <input
                        type="text"
                        name="author"
                        value="{{ blog.author }}"
                        placeholder="Enter author name"
                    >
                </div>

            </div>

            <!-- Cover Image -->
            <div class="field-group">
                <label>Cover Image</label>

                <div class="upload-section">
                    {% if blog.image %}
                    <div class="current-image-wrapper">
                        <img src="{{ blog_image_url(blog.image) }}" class="edit-preview" alt="Blog Cover">
                        <div class="image-overlay">
                            <span>Current Cover</span>
                        </div>
                    </div>
                    {% endif %}

                    <label class="upload-box" for="imageInput">
                        <div class="upload-content">
                            <span class="upload-icon"><i class="fa-solid fa-image"></i></span>
                            <h4>Change Cover Image</h4>
                            <p>Upload a fresh image to update your blog cover</p>
                        </div>
                    </label>

                    <input type="file" id="imageInput" accept="image/*">
                    <input type="file" name="cover_image_cropped" id="croppedImage" hidden>

                    <div class="new-preview-wrapper" id="newPreviewWrapper">
                        <img id="newPreview" alt="New Preview">
                    </div>
                </div>
            </div>

            <!-- Content -->
            <div class="field-group">
                <label>Blog Content</label>

                <input type="hidden" name="content" id="hiddenContent">

                <div class="editor-shell">
                    <div id="editor">{{ blog.content|safe }}</div>
                </div>
            </div>

            <!-- Publish Toggle -->
            <div class="status-row">
                <label class="premium-checkbox">
                    <input
                        type="checkbox"
                        name="is_published"
                        {% if blog.is_published %}checked{% endif %}
                    >
                    <span class="checkmark"></span>
                    <div class="status-text">
                        <strong>Publish Blog</strong>
                        <small>Make this article visible to your audience</small>
                    </div>
                </label>
            </div>

            <!-- Actions -->
            <div class="form-actions">
                <button type="submit" class="update-btn">
                    Update Blog
                </button>
            </div>

        </form>

    </div>
</div>

<!-- Crop Modal -->
<div id="cropModal" class="crop-modal">
    <div class="crop-box">
        <h3>Crop Image (Square)</h3>

        <div class="crop-image-shell">
            <img id="cropImage" style="max-width:100%;">
        </div>

        <div class="crop-actions">
            <button type="button" onclick="closeCrop()">Cancel</button>
            <button type="button" onclick="applyCrop()">Crop &amp; Use</button>
        </div>
    </div>
</div>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>

<script>
const quill = new Quill('#editor', {
    theme: 'snow',
    placeholder: 'Update your blog content...',
    modules: {
        toolbar: [
            [{ header: [1, 2, 3, false] }],
            ['bold', 'italic', 'underline'],
            [{ list: 'ordered' }, { list: 'bullet' }],
            ['link', 'image'],
            ['clean']
        ]
    }
});

const imageInput = document.getElementById("imageInput");
const newPreview = document.getElementById("newPreview");
const newPreviewWrapper = document.getElementById("newPreviewWrapper");
const croppedImage = document.getElementById("croppedImage");
const cropModal = document.getElementById("cropModal");
const cropImage = document.getElementById("cropImage");
let cropper;
let currentFile = null;

imageInput.addEventListener("change", function (e) {
    const file = e.target.files[0];
    if (!file) return;

    currentFile = file;
    openCropper();
});

function openCropper() {
    const file = currentFile;
    const reader = new FileReader();

    reader.onload = function(e) {
        cropImage.src = e.target.result;
        cropModal.style.display = "flex";

        cropImage.onload = function() {
            if (cropper) cropper.destroy();

            cropper = new Cropper(cropImage, {
                aspectRatio: 1,
                viewMode: 1,
                dragMode: "move",
                movable: true,
                zoomable: true,
                scalable: true,
                cropBoxMovable: true,
                cropBoxResizable: true,
                autoCropArea: 0.9,
                background: false,
                responsive: true
            });
        };
    };

    reader.readAsDataURL(file);
}

function applyCrop() {
    if (!cropper) return;

    const canvas = cropper.getCroppedCanvas({
        width: 800,
        height: 800
    });

    canvas.toBlob(function(blob) {
        const file = new File([blob], "blog-cover.jpg", { type: "image/jpeg" });
        const dataTransfer = new DataTransfer();
        dataTransfer.items.add(file);
        croppedImage.files = dataTransfer.files;

        newPreview.src = URL.createObjectURL(file);
        newPreviewWrapper.style.display = "block";

        closeCrop();
    }, "image/jpeg", 0.95);
}

function closeCrop() {
    cropModal.style.display = "none";

    if (cropper) {
        cropper.destroy();
        cropper = null;
    }
}

document.getElementById("editBlogForm").addEventListener("submit", function (e) {
    e.preventDefault();
    document.getElementById("hiddenContent").value = quill.root.innerHTML;

    if (imageInput.files.length && !croppedImage.files.length) {
        alert("Please crop the selected cover image before updating.");
        return;
    }

    this.submit();
});
</script>

<style>
.crop-box {
    width: 90%;
    max-width: 650px;
    background: #ffffff;
    border-radius: 16px;
    padding: 24px;
    border: 1px solid #e5e7eb;
}

#cropImage {
    max-width: 100%;
    display: block;
}

.crop-image-shell {
    width: 100%;
    height: 300px;
}

.crop-actions {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    margin-top: 15px;
    position: relative;
    z-index: 10;
}

.crop-actions button {
    padding: 12px 18px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #0A5C56, #083E3A);
    color: #fff;
    cursor: pointer;
}

.crop-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 9999;
    justify-content: center;
    align-items: center;
}

.crop-box h3 {
    color: #111;
    margin-bottom: 15px;
}

.blog-edit-page {
    min-height: 100vh;
    padding: 32px;
    background:#ffffff;

}

/* Header */
.edit-header {
    
    margin-bottom: 28px;
}

.edit-header h2 {
    margin: 0 0 8px;
    font-size: 30px;
    font-weight: 400;
    color: #000;
    letter-spacing: -0.5px;
}

.edit-header p {
    margin: 0;
    color:#555;
    font-size: 15px;
}

/* Card */
.edit-card {
    background:  #fff;
    backdrop-filter: blur(18px);
    border-radius: 24px;
    padding: 28px;
    border: 1px solid #e5e7eb;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);}

/* Grid */
.form-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
}

/* Fields */
.field-group {
    margin-bottom: 28px;
}

.field-group label {
    display: block;
    margin-bottom: 10px;
    font-size: 15px;
    font-weight: 400;
    color: #111;
}

.field-group input[type="text"] {
    width: 100%;
    padding: 15px 18px;
    border-radius: 16px;
    border:  1px solid #ddd;
    background: #fff;
    font-size: 15px;
    color: #000;
    outline: none;
    box-sizing: border-box;
    transition: all 0.3s ease;
}

.field-group input[type="text"]:focus {
    border-color:  #0A5C56;
    box-shadow: 0 0 0 4px rgba(10,92,86,0.15);
}

/* Upload */
.upload-section {
    display: flex;
    flex-direction: column;
    gap: 22px;
}

.current-image-wrapper,
.new-preview-wrapper {
    position: relative;
    border-radius: 24px;
    overflow: hidden;
    background: #f8fafc;
    border: 1px solid #edf2f7;
}

.edit-preview,
#newPreview {
    width: 100%;
    max-height: 480px;
    object-fit: cover;
    display: block;
}

.image-overlay {
    position: absolute;
    inset: auto 0 0 0;
    padding: 18px;
   background: linear-gradient(135deg, #0A5C56, #083E3A);
    color: white;
    font-size: 14px;
    font-weight: 400;
}

.upload-box {
    width: 100%;
    min-height: 180px;
    border: 2px dashed #cbd5e1;
    border-radius: 24px;
   background: #fafafa;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    transition: all 0.3s ease;
    text-decoration: none;
}

.upload-box:hover {
    border-color: #111;
    transform: translateY(-2px);
}

.upload-content {
    text-align: center;
}
.upload-content h4,
.upload-content p {
    color: #555;
}
.upload-icon {
    display: block;
    font-size: 42px;
    margin-bottom: 12px;
}

.upload-content h4 {
    margin: 0 0 6px;
    font-size: 20px;
    color: #111;
}

.upload-content p {
    margin: 0;
    color: #6b7280;
    font-size: 14px;
}

#imageInput {
    display: none;
}

.new-preview-wrapper {
    display: none;
}

/* Editor */
.editor-shell {
    border-radius: 22px;
    overflow: hidden;
    background: #fff;
    border: 1px solid #e5e7eb;
    box-shadow: inset 0 0 0 1px #e5e7eb;
}

#editor {
    min-height: 460px;
}
.editor-shell {
    background: #fff;
    border: 1px solid #e5e7eb;
}

.ql-toolbar.ql-snow {
    border: none;
    border-bottom: 1px solid #ececec;
    background:#fff;
    padding: 14px;
}

.ql-container.ql-snow {
    border: none;
    background: white;
}

.ql-editor {
    min-height: 460px;
    color:#000 !important;
    background: transparent;
    font-size: 16px;
    line-height: 1.8;
    padding: 24px;
}

.ql-editor.ql-blank::before {
    color: #9ca3af !important;
    font-style: normal;
}

/* Publish */
.status-row {
    margin-top: 8px;
    margin-bottom: 28px;
}

.premium-checkbox {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px;
    border-radius: 22px;
background:#fff;
    border:  1px solid #e5e7eb;
    cursor: pointer;
    transition: all 0.3s ease;
}

.premium-checkbox:hover {
    border-color: #cfd8e6;
}

.premium-checkbox input {
    display: none;
}

.checkmark {
    width: 24px;
    height: 24px;
    border-radius: 8px;
    border: 2px solid #cbd5e1;
    background: white;
    position: relative;
    transition: all 0.3s ease;
    flex-shrink: 0;
}

.premium-checkbox input:checked + .checkmark {
   background: linear-gradient(135deg, #0A5C56, #083E3A);
    border-color: #111;
}

.premium-checkbox input:checked + .checkmark::after {
    content: "\2713";
    position: absolute;
    color: white;
    font-size: 14px;
    font-weight: 400;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

.status-text strong {
    display: block;
    color:  #000;
    font-size: 15px;
}

.status-text small {
    color: #555;
    font-size: 13px;
}

/* Button */
.form-actions {
    display: flex;
    justify-content: flex-end;
}

.update-btn {
    border: none;
    padding: 16px 34px;
    border-radius: 18px;
  background: linear-gradient(135deg, #00c6b2, #0A5C56);
    color: white;
    font-size: 15px;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 12px 24px rgba(0,0,0,0.12);
}
.update-btn,
.add-btn,
.publish-btn {
    background: linear-gradient(135deg, #0A5C56, #083E3A);
    color: white;
    border: none;
    transition: 0.3s;
}
.update-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 18px 34px rgba(0,0,0,0.18);
}

/* Mobile */

    .blog-edit-page {
        padding: 0 8px 10px !important;
    }

    .edit-header {
        margin-bottom: 8px !important;
    }

    .edit-header h2 {
        font-size: 20px !important;
        line-height: 1.15 !important;
        margin: 0 0 3px !important;
        letter-spacing: 0;
    }

    .edit-header p {
        font-size: 11.5px !important;
        line-height: 1.35 !important;
        margin: 0 !important;
    }

    .edit-card {
        padding: 12px !important;
        margin: 0 !important;
        border-radius: 12px !important;
        box-shadow: 0 4px 14px rgba(0,0,0,0.04) !important;
    }

    .form-grid {
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) !important;
        gap: 8px !important;
    }

    .field-group {
        margin-bottom: 12px !important;
        min-width: 0;
    }

    .field-group label {
        font-size: 11.5px !important;
        line-height: 1.25 !important;
        margin-bottom: 4px !important;
    }

    .field-group input[type="text"] {
        min-height: 34px !important;
        padding: 7px 8px !important;
        border-radius: 8px !important;
        font-size: 11.5px !important;
        line-height: 1.25 !important;
    }

    .upload-section {
        gap: 9px !important;
    }

    .current-image-wrapper,
    .new-preview-wrapper {
        border-radius: 10px !important;
    }

    .edit-preview,
    #newPreview {
        max-height: 150px !important;
        aspect-ratio: 16 / 9;
        object-fit: cover !important;
    }

    .image-overlay {
        padding: 7px 9px !important;
        font-size: 10.5px !important;
        line-height: 1.2 !important;
    }

    .upload-box {
        min-height: 82px !important;
        padding: 12px !important;
        border-radius: 10px !important;
    }

    .upload-icon {
        font-size: 22px !important;
        margin-bottom: 5px !important;
    }

    .upload-content h4 {
        font-size: 12.5px !important;
        line-height: 1.2 !important;
        margin-bottom: 3px !important;
    }

    .upload-content p {
        font-size: 10.5px !important;
        line-height: 1.3 !important;
    }

    .editor-shell {
        border-radius: 10px !important;
    }

    .ql-toolbar.ql-snow {
        padding: 5px !important;
    }

    .ql-toolbar.ql-snow .ql-formats {
        margin-right: 4px !important;
    }

    #editor,
    .ql-editor {
        min-height: 180px !important;
    }

    .ql-editor {
        padding: 10px !important;
        font-size: 12px !important;
        line-height: 1.45 !important;
    }

    .status-row {
        margin-top: 4px !important;
        margin-bottom: 12px !important;
    }

    .premium-checkbox {
        align-items: flex-start;
        gap: 9px !important;
        padding: 10px !important;
        border-radius: 10px !important;
    }

    .checkmark {

    }

    .premium-checkbox input:checked + .checkmark::after {

    }

    .status-text strong {

    }

    .status-text small {

    }

    .form-actions {
        justify-content: stretch;
        gap: 8px !important;
    }

    .update-btn {
        width: 100%;
        min-height: 36px !important;
        padding: 9px 12px !important;
        border-radius: 9px !important;
        font-size: 12px !important;
        line-height: 1.2 !important;
        box-shadow: none !important;
    }

    .crop-box {
        width: calc(100vw - 24px) !important;
        padding: 12px !important;
        border-radius: 12px !important;
    }

        margin-bottom: 8px !important;
    }

    .crop-image-shell {

    }

        gap: 8px !important;
    }

    .crop-actions button {

    }
}

@media (max-width: 380px) {
    .form-grid {
        grid-template-columns: 1fr !important;
    }
}
</style>

{% endblock %}

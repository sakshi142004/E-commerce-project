{% extends "base.html" %}
{% block content %}

<style>
body
{
 font-family: 'Cormorant Garamond', serif;
}
.blog-page {
    max-width: 850px;
    margin: 14px auto 40px;
    background: white;
    padding-top: 28px;
    padding-right: 32px;
    padding-bottom: 32px;
    padding-left: 32px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.blog-page img {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    display: block;
    border-radius: 16px;
    margin-bottom: 22px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    background: transparent;
}
.blog-page h1 {
    font-size: 34px;
    margin-top: 0;
    margin-bottom: 8px;
}

.blog-meta {
    color: gray;
    font-size: 14px;
    margin-bottom: 16px;
}

.blog-content {
    line-height: 1.8;
    font-size: 17px;
    color: #333;
}

.back-btn {
    display: inline-block;
    margin-top: 12px;

    font-size: 18px;
    font-weight: 400;

    color: var(--btn-gradient);
    text-decoration: none;

    cursor: pointer;
    transition: 0.3s ease;
}

@media (max-width: 768px) {
    .blog-page {
        margin: 10px 14px 32px;
        padding: 22px 18px 26px;
    }

    .blog-page h1 {
        font-size: 28px;
    }

    .blog-meta {
        margin-bottom: 14px;
    }

    .blog-page img {
        margin-bottom: 18px;
    }
}
</style>

<div class="blog-page">

    <h1>{{ blog.title }}</h1>

    <div class="blog-meta">
        {{ blog.author }} - {% if blog.created_at %}{{ blog.created_at.strftime('%d %b %Y') }}{% else %}Recently added{% endif %}
    </div>

    <img src="{{ blog_image_url(blog.image) }}" alt="{{ blog.title }}">

    <div class="blog-content">
        {{ blog.content |safe }}
    </div>

    <div class="back-btn" onclick="window.location='/blogs'">
        &larr; Back to Blogs
    </div>

</div>

{% endblock %}

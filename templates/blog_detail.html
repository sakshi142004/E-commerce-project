{% extends "base.html" %}
{% block content %}>

<style>
body
{
 font-family: 'Cormorant Garamond', serif;
}
.blog-page {
    max-width: 850px;
    margin: 0 auto;
    background: white;
    padding-top: 80px;
    padding-right: 40px;
    padding-bottom: 40px;
    padding-left: 40px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.blog-page img {
    width: 100%;
    border-radius: 12px;
    margin-bottom: 25px;
}

.blog-page h1 {
    font-size: 34px;
    margin-bottom: 10px;
}

.blog-meta {
    color: gray;
    font-size: 14px;
    margin-bottom: 20px;
}

.blog-content {
    line-height: 1.8;
    font-size: 17px;
    color: #333;
}

.back-btn {
    display: inline-block;
    margin-top: 30px;
    color: #9ee8db;
    cursor: pointer;
}
</style>

<div class="blog-page">

    <h1>{{ blog.title }}</h1>

    <div class="blog-meta">
        {{ blog.author }} • {{ blog.created_at.strftime('%d %b %Y') }}
    </div>

    <img src="{{ blog.image }}">

    <div class="blog-content">
        {{ blog.content }}
    </div>

    <div class="back-btn" onclick="window.location='/blogs'">
        ← Back to Blogs
    </div>

</div>

{% endblock %}

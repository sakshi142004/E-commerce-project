{% extends "base.html" %}
{% block content %}

<style>
    body {
        font-family: 'Cormorant Garamond', serif;
        background: #f7f7f7;
        margin: 0;
        padding: 0;
    }

    .blogs-container {
        max-width: 1300px;
        margin: auto;
        padding-top: 30px;
        padding-right: 20px;
        padding-bottom: 60px;
        padding-left: 20px;
    }
/* ===== BLOG HERO SECTION ===== */

    /* ===== Featured Blog ===== */
    .featured-blog {
        display: grid;
        grid-template-columns: 1.4fr 1fr;
        gap: 40px;
        align-items: center;
        background: #fff;
        border-radius: 24px;
        overflow: hidden;
        box-shadow: 0 12px 35px rgba(0, 0, 0, 0.08);
        margin-bottom: 70px;
        cursor: pointer;
        transition: 0.3s ease;
    }

    .featured-blog:hover {
        transform: translateY(-6px);
    }

    .featured-blog img {
        width: 100%;
        height: 500px;
        object-fit: cover;
    }

    .featured-content {
        padding: 50px;
    }

    .featured-label {
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: #b8895a;
        font-weight: 400;
        margin-bottom: 12px;
    }

    .featured-content h1 {
        font-size: 52px;
        line-height: 1.2;
        margin-bottom: 20px;
        color: #222;
    }

    .featured-meta {
        font-size: 16px;
        color: #777;
        margin-bottom: 20px;
    }

    .featured-content p {
        font-size: 18px;
        line-height: 1.8;
        color: #555;
        margin-bottom: 30px;
    }

    .featured-btn {
        display: inline-block;
        padding: 14px 28px;
        background: #222;
        color: white;
        text-decoration: none;
        border-radius: 40px;
        transition: 0.3s;
    }

    .featured-btn:hover {
        background: #b8895a;
    }

    /* ===== Recent Blogs ===== */
    .section-title {
        font-size: 42px;
        text-align: center;
        margin-bottom: 50px;
        color: #222;
    }

    .blog-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 35px;
    }

    .blog-card {
        background: #fff;
        border-radius: 22px;
        overflow: hidden;
        cursor: pointer;
        transition: all 0.35s ease;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.07);
    }

    .blog-card:hover {
        transform: translateY(-10px);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
    }

    .blog-image {
    width: 100%;
    aspect-ratio: 1 / 1;   /* 🔥 perfect square */
    background: #f5f5f5;   /* empty space clean lage */
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

.blog-image img {
    width: 100%;
    height: 100%;
    object-fit: contain;   /* 🔥 FULL IMAGE visible (no crop) */
}

    .blog-content {
        padding: 24px;
    }

    .blog-meta {
        font-size: 14px;
        color: #888;
        margin-bottom: 12px;
    }

    .blog-content h3 {
        font-size: 24px;
        margin: 0 0 15px;
        color: #222;
        line-height: 1.4;
    }

    .blog-content p {
        font-size: 16px;
        color: #666;
        line-height: 1.7;
    }

    .read-more {
        display: inline-block;
        margin-top: 20px;
        color: var (--btn-gradient);
        font-size: 15px;
        font-weight: 400;
        text-decoration: none;
    }

    /* ===== Responsive ===== */
    @media (max-width: 992px) {
        .featured-blog {
            grid-template-columns: 1fr;
        }

        .featured-blog img {
            height: 350px;
        }

        .featured-content h1 {
            font-size: 38px;
        }
    }

    @media (max-width: 768px) {
        .featured-content {
            padding: 30px;
        }

        .featured-content h1 {
            font-size: 30px;
        }

        .section-title {
            font-size: 32px;
        }
    }
</style>




<div class="blogs-container">
    <!-- Recent Blogs -->
    <h2 class="section-title">Recent Blog Posts</h2>

    <div class="blog-grid">
        {% for b in blogs[1:] %}
        <div class="blog-card" onclick="window.location='/blog/{{ b.slug }}'">

    <!-- 🔥 NEW WRAPPER -->
    <div class="blog-image">
        <img src="{{ b.image or '/static/images/default.png' }}" alt="{{ b.title }}">
    </div>

    <div class="blog-content">
                <div class="blog-meta">
                    {{ b.author }} • {{ b.created_at.strftime('%d %b %Y') }}
                </div>

                <h3>{{ b.title }}</h3>

                <p>
                    <p>
    {{ b.content | striptags | truncate(100) }}
</p>
                </p>

                <span class="read-more">Read More →</span>
            </div>
        </div>
        {% endfor %}
    </div>

</div>

{% endblock %}

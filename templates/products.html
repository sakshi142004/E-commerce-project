{% extends "base.html" %}
{% block content %}
<link href="https://fonts.cdnfonts.com/css/gotham" rel="stylesheet">
<style>
/* ===== FIX TOP SPACE (NAVBAR GAP) ===== */
.products-page {
    margin-top: 10px;
    padding-top: 15px;   /* 🔥 pehle zyada gap tha */
}

/* ===== HEADER COMPACT ===== */
.products-header {
    margin-bottom: 1px;   /* gap kam */
}

/* ===== TITLE SPACING FIX ===== */
.products-title {
    margin: 0;
    padding: 0;
}

/* Premium Collection */
.products-title .eyebrow {
    display: block;
    font-size: 13px;
    margin-bottom: 3px;   /* 🔥 tight */
    line-height: 1.2;
}

/* All Products */
.products-title h2 {
    margin: 2px 0;        /* 🔥 main gap fix */
    font-size: 26px;
    line-height: 1.2;
}

/* subtitle */
.products-title .subtitle {
    margin-top: 3px;
    font-size: 14px;
    line-height: 1.4;
}
    .wishlist-btn.active{
    color:red;
}
.products-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:22px;
}

/* CARD */
.product-card{
    background:#fff;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
    transition:0.3s;
    position:relative;
}

.product-card:hover{
    transform:translateY(-5px);
}

/* IMAGE */
.product-image-wrapper {
    aspect-ratio: 1 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f5f5f5;
}

.product-image-wrapper img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
}
/* BADGE */
.discount-badge{
    position:absolute;
    top:10px;
    left:10px;
    background:#e53935;
    color:#fff;
    padding:5px 10px;
    font-size:12px;
    border-radius:6px;
    font-weight:600;
}
.products-page:first-child {
    margin-top: 0;
}
/* WISHLIST */
.wishlist-btn{
    position:absolute;
    top:10px;
    right:10px;
    background:#fff;
    border:none;
    width:32px;
    height:32px;
    border-radius:50%;
    cursor:pointer;
}

/* INFO */
.product-info{
    padding: 10px 12px !important;
    display: flex;
    flex-direction: column;
    gap: 4px;   /* controlled spacing */
}

/* TITLE */
.product-info h4{
    font-size: 17px;
    margin: 0 !important;
    line-height: 1.2;
    font-weight: 600;
    
    /* optional: clean 2 line clamp */
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}


/* PRICE */
.price-box{
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 0 !important;
}

/* CURRENT PRICE */
.price-box span:first-child{
    font-weight: 600;
    font-size: 14px;
}

/* OLD PRICE */
.old-price{
    text-decoration: line-through;
    color: #888;
    font-size: 12px;
}
/* ROW: IMAGE + VIDEO SIDE BY SIDE */
.color-row {
    display: flex;
    gap: 16px;
    margin-bottom: 20px;
    align-items: flex-start;
}

/* IMAGE BLOCK */
.color-block {
    flex-shrink: 0;
}

/* VIDEO BLOCK SAME SIZE */
.video-block {
    width: 260px;
    height: 260px;
    border-radius: 14px;
    overflow: hidden;
    background: #000;
}

.video-block video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* MOBILE */
@media (max-width: 768px) {
    
    .color-row {
        flex-direction: column;
    }

    .video-block {
        width: 100%;
        height: 220px;
    }


  /* 🔥 HEADER STACK FIX */
  .products-header {
    flex-direction: column;
    align-items: flex-start;
    gap: 12px;
  }

  /* 🔥 TITLE FULL WIDTH + SINGLE CLEAN LINE */
  .products-title h2 {
    font-size: 22px;
    white-space: nowrap;   /* 👈 force single line */
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .products-title .eyebrow {
    font-size: 12px;
    margin-bottom: 2px;
  }

  .products-title .subtitle {
    font-size: 12px;
    line-height: 1.4;
  }

  /* 🔥 FILTER BELOW TITLE (ONLY MOBILE) */
  .filter-controls {
    width: 100%;
    display: flex;
    justify-content: space-between;
    gap: 10px;
  }

  .filter-group label {
    font-size: 10px;
  }

  #productSort {
    font-size: 12px;
    height: 34px;
  }

  .filter-pill {
    height: 34px;
    font-size: 12px;
  }
}
/* RATING */
.rating{
    color: #1a7f37;
    font-size: 13px;
    margin: 0 !important;
    line-height: 1;
    display: flex;
    align-items: center;
    gap: 1px;
}

/* ADD TO CART BUTTON */
.add-cart-btn{
    width:100%;
    margin-top:6px;
    padding:10px;
    border:none;
    border-radius: 10px;
    background: var(--btn-gradient);
    color:#fff;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
}

.add-cart-btn:hover{
    background:var(--btn-gradient);
}
.add-cart-btn.active{
    background:linear-gradient(135deg, #0f655f, #055e58);;
}

/* ===== HEADER LAYOUT ===== */
/* ===== HEADER LAYOUT FINAL FIX ===== */
.products-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 20px;

    flex-wrap: nowrap;   /* ❌ wrap hatao */
}

/* LEFT SIDE (TITLE) */
.products-title {
    flex: 1;   /* 🔥 left side full space le */
}

/* RIGHT SIDE (FILTERS) */
/* RIGHT SIDE FILTERS */
.filter-controls {
    display: flex;
    align-items: flex-end;   /* 🔥 sab bottom pe align honge */
    gap: 12px;
}

/* GROUP (Sort by block) */
.filter-group {
    display: flex;
    flex-direction: column;   /* label upar, select neeche */
    justify-content: flex-end;
}

/* LABEL (thoda upar rahega naturally) */
.filter-group label {
    font-size: 12px;
    margin-bottom: 4px;
    line-height: 1;
}

/* SELECT */
#productSort {
    height: 36px;
    padding: 0 14px;

    border-radius: 999px;
    border: 1px solid rgba(10, 92, 86, 0.3);

    background: rgba(10, 92, 86, 0.08);
    color: #083E3A;

    font-size: 13px;
    cursor: pointer;

    appearance: none;
}

/* ON SALE BUTTON */
.filter-pill {
    height: 36px;
    padding: 0 16px;

    display: flex;
    align-items: center;
    justify-content: center;

    border-radius: 999px;
    border: 1px solid rgba(10, 92, 86, 0.3);

    background: rgba(10, 92, 86, 0.08);
    color: #083E3A;

    font-size: 13px;
    cursor: pointer;
}
.filter-pill.active {
    background: linear-gradient(135deg, #0A5C56, #083E3A);
    color: white;
}
/* ===== SIZE MODAL TEXT STYLE ===== */
.size-box{
    font-family: "Gotham", "Poppins", sans-serif;
}

/* ===== SIZE BUTTONS (CIRCLE STYLE) ===== */
#sizeList{
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 15px;
    justify-content: center;
}

#sizeList button{
    width: 48px;
    height: 48px;
    border-radius: 50%;   /* 🔥 circle */
    
    border: 1px solid #ddd;
    background: #fff;

    font-family: "Gotham", "Poppins", sans-serif;
    font-weight: 600;
    font-size: 13px;

    cursor: pointer;

    display: flex;
    align-items: center;
    justify-content: center;

    transition: all 0.25s ease;
}

/* ===== HOVER EFFECT (cyan-green) ===== */
#sizeList button:hover{
    background: linear-gradient(135deg, #063338, #00c853);
    color: #fff;
    border-color: transparent;
    transform: scale(1.1);
    box-shadow: 0 6px 15px rgba(0, 229, 255, 0.3);
}

/* ===== SELECTED SIZE ===== */
#sizeList button.active{
    background:  linear-gradient(135deg, #0a3a3f, #00c853);
    color: #fff;
    border-color: transparent;
    transform: scale(1.1);
}.size-modal{
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    backdrop-filter: blur(6px);
}

/* GLASS CARD */
.size-glass{
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);

    border: 1px solid rgba(255,255,255,0.4);
    box-shadow: 0 20px 50px rgba(0,0,0,0.15);

    padding: 20px 25px;
    border-radius: 18px;
    min-width: 280px;
    text-align: center;

    animation: pop 0.25s ease;
}

/* ANIMATION */
@keyframes pop{
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

/* HEADING */
.size-glass h3{
    font-family: "Gotham", sans-serif;
    font-size: 16px;
    margin-bottom: 15px;
    color: #0A5C56;
}
.hidden{
    display: none !important;
}
/* animation optional */
@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

</style>
<div class="products-page">
    <div class="products-header">
        <div class="products-title">
            <span class="eyebrow">Premium Collection</span>
            <h2>All Products</h2>
            <p class="subtitle">Shop curated products directly from the backend with real-time pricing, offers, and wishlist support.</p>
        </div>

        <div class="filter-controls">
            <div class="filter-group">
                <label for="productSort">Sort by</label>
                <select id="productSort">
                    <option value="featured">Featured</option>
                    <option value="price-asc">Price low to high</option>
                    <option value="price-desc">Price high to low</option>
                    <option value="discount">Top discount</option>
                </select>
            </div>

            <button id="filterSale" class="filter-pill" type="button">On Sale</button>
        </div>
    </div>

    <div id="allProducts" class="products-grid"></div>
</div>

<div id="sizeModal" class="size-modal hidden">
    <div class="size-glass">
        <h3>Select Size</h3>
        <div id="sizeList"></div>
    </div>
</div>


<script>
  let allProductsData = [];
let activeColorFilter = new URLSearchParams(window.location.search).get("color") || "";
let selectedProductId = null;
let selectedSizeId = null;

function getProductBaseId(product) {
    return product.product_id || product.id;
}

function getProductColorId(product) {
    return product.color_variant?.id || product.colors?.[0]?.id || null;
}

function getProductDetailUrl(product) {
    const productId = getProductBaseId(product);
    const colorId = getProductColorId(product);

    return colorId
        ? `/product/${productId}?color=${colorId}`
        : `/product/${productId}`;
}
/* ================= FILTER LOGIC ================= */
function applyProductFilters() {
    if (!allProductsData.length) return;

    const sortSelect = document.getElementById("productSort");
    const saleBtn = document.getElementById("filterSale");

    const sortValue = sortSelect ? sortSelect.value : "featured";
    const showSaleOnly = saleBtn ? saleBtn.classList.contains("active") : false;

    let products = [...allProductsData];

    if (activeColorFilter) {
        products = products.filter(product =>
            product.colors?.some(color => String(color.id) === activeColorFilter)
        );
    }

    if (showSaleOnly) {
        products = products.filter(p => p.discount_percent > 0);
    }

    if (sortValue === "price-asc") {
        products.sort((a, b) => a.price - b.price);
    } else if (sortValue === "price-desc") {
        products.sort((a, b) => b.price - a.price);
    } else if (sortValue === "discount") {
        products.sort((a, b) => (b.discount_percent || 0) - (a.discount_percent || 0));
    }

    renderProductsGrid(products);
}

/* ================= CART ================= */
function toggleCart(productId, btn, colorId = null) {

    const isLoggedIn = document.querySelector(".avatar, .avatar-img");

    if (!isLoggedIn) {
        openPopup();
        return;
    }

    selectedProductId = productId;

    // 🟢 CHECK CURRENT STATE FIRST
    const isActive = btn.classList.contains("active");

    // ❌ REMOVE FLOW (NO SIZE MODAL)
  if (isActive) {
    const sizeId = btn.dataset.size || "";
    fetch(`/remove_cart/${productId}?color_id=${colorId || ""}&size_id=${sizeId}`)
        .then(res => res.json())
        .then(data => {

            btn.classList.remove("active");
            btn.innerText = "Add to Cart";

            updateCartCount();

        });

    return;
}

    // 🟡 ADD FLOW → OPEN SIZE MODAL
    selectedSizeId = null;
    openSizeModal(productId, colorId);
}


/* ================= OPEN SIZE MODAL ================= */
function openSizeModal(productId, colorId = null) {

    fetch(`/product/sizes/${productId}`)
        .then(res => res.json())
        .then(sizes => {

            const list = document.getElementById("sizeList");
            list.innerHTML = "";

            if (!Array.isArray(sizes) || sizes.length === 0) {
                list.innerHTML = "<p>No sizes available</p>";
                return;
            }

            sizes.forEach(s => {
                const btn = document.createElement("button");
                btn.innerText = s.label;

                btn.onclick = () => {
                    selectedSizeId = s.id;

                    // UI select effect
                    document.querySelectorAll("#sizeList button")
                        .forEach(b => b.classList.remove("active"));

                    btn.classList.add("active");

                    // ✅ DIRECT ADD TO CART (NO CONFIRM)
                    fetch(`/cart/toggle/${productId}`, {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            size_id: selectedSizeId,
                            color_id: colorId
                        })
                    })
                    .then(res => res.json())
                    .then(data => {

                        if (data.error === "size_required") {
                            alert("Size required");
                            return;
                        }

                        document.getElementById("cartCount").innerText = data.count;

                        const cartBtn = document.querySelector(
                            `.add-cart-btn[data-id="${productId}"][data-color="${colorId || ""}"]`
                        );

                        if (cartBtn) {
                            cartBtn.classList.add("active");
                            cartBtn.innerText = "Remove from Cart";
                        }

                        updateCartCount();

                        // 🔥 AUTO CLOSE MODAL
                        document.getElementById("sizeModal").classList.add("hidden");

                        selectedProductId = null;
                        selectedSizeId = null;
                    });
                };

                list.appendChild(btn);
            });

            document.getElementById("sizeModal").classList.remove("hidden");
        });
}

/* ================= CONFIRM ADD/REMOVE CART ================= */


/* ================= CLOSE MODAL ================= */
function closeSizeModal() {
    document.getElementById("sizeModal").classList.add("hidden");

    selectedProductId = null;
    selectedSizeId = null;
}

/* ================= CHECK CART ================= */
function checkCart(productId, colorId = null) {
    return fetch(`/cart/check/${productId}${colorId ? `?color_id=${colorId}` : ""}`)
        .then(res => res.json());   // FULL object return karo
}


function updateCartCount() {
    fetch("/get_counts")
        .then(res => res.json())
        .then(data => {
            document.getElementById("cartCount").innerText = data.cart;
        });
}
/* ================= RENDER PRODUCTS ================= */
function renderProductsGrid(products) {
    const container = document.getElementById("allProducts");
    container.innerHTML = "";

    if (!products.length) {
        container.innerHTML = "<p>No products found</p>";
        return;
    }

    products.forEach(product => {

        const productId = getProductBaseId(product);
        const variantColor = product.color_variant || product.colors?.[0] || null;
        const colorId = variantColor?.id || null;
        const defaultImage = product.images?.[0] || "/static/images/default.png";

        const colorsHTML = variantColor
            ? `<div class="color-row">
                <span class="color-dot active"
                    style="background:${variantColor.code}"
                    title="${variantColor.name}"
                    data-color="${variantColor.id}">
                </span>
            </div>`
            : "";

        const discountHTML = product.discount_percent > 0
            ? `<span class="discount-badge">-${product.discount_percent}%</span>`
            : "";

        const oldPriceHTML = product.original_price
            ? `<span class="old-price">₹${product.original_price}</span>`
            : "";

        const ratingHTML = product.rating
            ? `<div class="rating">⭐ ${product.rating}</div>`
            : "";

        const div = document.createElement("div");
        div.className = "product-card";

        div.innerHTML = `
            <div class="product-image-wrapper">
                ${discountHTML}
                <button class="wishlist-btn">♡</button>
                <img class="product-img" src="${defaultImage}">
            </div>

            <div class="product-info">
                <h4>${product.name}</h4>
                ${ratingHTML}

                <div class="price-box">
                    <span>₹${product.price}</span>
                    ${oldPriceHTML}
                </div>

                ${colorsHTML}

              <button class="add-cart-btn" data-id="${productId}" data-color="${colorId || ""}">
    Add to Cart
</button>
            </div>
        `;

        const imgEl = div.querySelector(".product-img");
        const wishlistBtn = div.querySelector(".wishlist-btn");
        const cartBtn = div.querySelector(".add-cart-btn");

        /* ❤️ WISHLIST INITIAL */
        checkWishlist(productId, colorId).then(inWishlist => {
            if (inWishlist) {
                wishlistBtn.classList.add("active");
                wishlistBtn.innerHTML = "❤️";
            }
        });

        /* ❤️ WISHLIST CLICK */
        wishlistBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            addToWishlist(productId, wishlistBtn, colorId);
        });

        /* 🛒 CART INITIAL */
  checkCart(productId, colorId).then(data => {
    if (data.in_cart) {
        cartBtn.classList.add("active");
        cartBtn.innerText = "Remove from Cart";
        cartBtn.dataset.size = data.size_id;
    }
});

        /* 🛒 CART CLICK */
     cartBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    toggleCart(productId, cartBtn, colorId);
});

        /* 🎨 IMAGE HOVER */
        div.querySelectorAll(".color-dot").forEach(dot => {

            dot.addEventListener("mouseenter", () => {
                const colorId = dot.dataset.color;
                const img = product.color_images?.[colorId];
                if (img?.length) imgEl.src = img[0];
            });

            dot.addEventListener("mouseleave", () => {
                imgEl.src = defaultImage;
            });

            dot.addEventListener("click", (e) => {
                e.stopPropagation();
                window.location.href = `/product/${productId}?color=${dot.dataset.color}`;
            });
        });

        /* 🔥 FIXED CARD CLICK */
        div.addEventListener("click", (e) => {

            if (
                e.target.closest(".add-cart-btn") ||
                e.target.closest(".wishlist-btn")
            ) return;

            window.location.href = getProductDetailUrl(product);
        });

        container.appendChild(div);
    });
}

/* ================= FILTER EVENTS ================= */
function setupProductFilters() {
    const sortSelect = document.getElementById("productSort");
    const saleBtn = document.getElementById("filterSale");

    sortSelect?.addEventListener("change", applyProductFilters);

    saleBtn?.addEventListener("click", () => {
        saleBtn.classList.toggle("active");
        applyProductFilters();
    });
}

/* ================= LOAD PRODUCTS ================= */
function loadAllProducts() {
    fetch("/products")
        .then(res => res.json())
        .then(data => {
            allProductsData = Array.isArray(data) ? data : [];
            setupProductFilters();
            applyProductFilters();
        })
        .catch(err => console.error("Product load error:", err));
}

/* INIT */
document.addEventListener("DOMContentLoaded", loadAllProducts);

</script>
{% endblock %}

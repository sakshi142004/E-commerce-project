{% extends "base.html" %}
{% block content %}
<link href="https://fonts.cdnfonts.com/css/gotham" rel="stylesheet">
<style>
/* ===== FIX TOP SPACE (NAVBAR GAP) ===== */
.products-page {
    margin-top: 10px;
    padding-top: 15px;
    padding-left: 12px;
    padding-right: 12px;
}

/* ===== HEADER COMPACT ===== */
.products-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
    flex-wrap: nowrap;
    margin-bottom: 1px;
}

/* ===== TITLE SPACING FIX ===== */
.products-title {
    flex: 1;
    margin: 0;
    padding: 0;
}

/* Premium Collection */
.products-title .eyebrow {
    display: block;
    font-size: 13px;
    margin-bottom: 3px;
    line-height: 1.2;
}

/* All Products */
.products-title h2 {
    margin: 2px 0;
    font-size: 26px;
    line-height: 1.2;
}

/* subtitle */
.products-title .subtitle {
    margin-top: 3px;
    font-size: 14px;
    line-height: 1.4;
}

/* ===== HEADER LAYOUT ===== */
.filter-controls {
    display: flex;
    align-items: flex-end;
    gap: 12px;
}

.filter-group {
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
}

.filter-group label {
    font-size: 12px;
    margin-bottom: 4px;
    line-height: 1;
}

#productSort {
    height: 36px;
    padding: 0 14px;
    border-radius: 999px;
    border: 1px solid rgba(10, 92, 86, 0.3);
    background: rgba(10, 92, 86, 0.08);
    color: #083E3A;
    font-size: 13px;
    cursor: pointer;
    appearance: none;
}

.filter-pill {
    height: 36px;
    padding: 0 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 999px;
    border: 1px solid rgba(10, 92, 86, 0.3);
    background: rgba(10, 92, 86, 0.08);
    color: #083E3A;
    font-size: 13px;
    cursor: pointer;
}

.filter-pill.active {
    background: linear-gradient(135deg, #0A5C56, #083E3A);
    color: white;
}

/* ===== GRID ===== */
.products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 22px;
    margin-top: 16px;
}

/* ===== RENAMED: prd-card (was product-card) ===== */
.prd-card {
    background: #fff;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    transition: 0.3s;
    position: relative;
    cursor: pointer;
}

.prd-card:hover {
    transform: translateY(-5px);
}

/* ===== RENAMED: prd-img-wrap (was product-image-wrapper) ===== */
.prd-img-wrap {
    aspect-ratio: 1 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f5f5f5;
    position: relative;
}

.prd-img-wrap img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
}

/* ===== BADGE ===== */
.discount-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    background: #e53935;
    color: #fff;
    padding: 5px 10px;
    font-size: 12px;
    border-radius: 6px;
    font-weight: 600;
    z-index: 1;
}

/* ===== WISHLIST ===== */
.prd-wishlist-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: #fff;
    border: none;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    z-index: 1;
}

.prd-wishlist-btn.active {
    color: red;
}

/* ===== RENAMED: prd-info (was product-info) ===== */
.prd-info {
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
}

/* TITLE */
.prd-info h4 {
    font-size: 17px;
    margin: 0;
    line-height: 1.2;
    font-weight: 600;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

/* ===== RENAMED: prd-rating (was rating) ===== */
.prd-rating {
    color: #1a7f37;
    font-size: 13px;
    margin: 0;
    line-height: 1;
    display: flex;
    align-items: center;
    gap: 1px;
}

/* ===== RENAMED: prd-price-box (was price-box) ===== */
.prd-price-box {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 0;
}

.prd-price-box span:first-child {
    font-weight: 600;
    font-size: 14px;
}

/* ===== RENAMED: prd-old-price (was old-price) ===== */
.prd-old-price {
    text-decoration: line-through;
    color: #888;
    font-size: 12px;
}

/* ===== COLOR ROW ===== */
.prd-color-row {
    display: flex;
    gap: 6px;
    align-items: center;
    margin: 0;
}

/* ===== RENAMED: prd-cart-btn (was add-cart-btn) ===== */
.prd-cart-btn {
    width: 100%;
    margin-top: 6px;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: var(--btn-gradient);
    color: #fff;
    cursor: pointer;
    font-weight: 600;
    font-size: 13px;
    line-height: 1;
    /* Fix: no extra bottom margin/padding */
    margin-bottom: 0;
}

.prd-cart-btn:hover {
    background: var(--btn-gradient);
}

.prd-cart-btn.active {
    background: linear-gradient(135deg, #0f655f, #055e58);
}

/* ===== SIZE MODAL ===== */
.size-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    backdrop-filter: blur(6px);
}

.size-glass {
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.4);
    box-shadow: 0 20px 50px rgba(0,0,0,0.15);
    padding: 20px 25px;
    border-radius: 18px;
    min-width: 280px;
    text-align: center;
    animation: pop 0.25s ease;
}

@keyframes pop {
    from { transform: scale(0.8); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
}

.size-glass h3 {
    font-family: "Gotham", sans-serif;
    font-size: 16px;
    margin-bottom: 15px;
    color: #0A5C56;
}

.size-box {
    font-family: "Gotham", "Poppins", sans-serif;
}

#sizeList {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 15px;
    justify-content: center;
}

#sizeList button {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 1px solid #ddd;
    background: #fff;
    font-family: "Gotham", "Poppins", sans-serif;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s ease;
}

#sizeList button:hover {
    background: linear-gradient(135deg, #063338, #00c853);
    color: #fff;
    border-color: transparent;
    transform: scale(1.1);
    box-shadow: 0 6px 15px rgba(0,229,255,0.3);
}

#sizeList button.active {
    background: linear-gradient(135deg, #0a3a3f, #00c853);
    color: #fff;
    border-color: transparent;
    transform: scale(1.1);
}

.hidden {
    display: none !important;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
}

/* ===== VIDEO BLOCK (product detail use) ===== */
.color-row {
    display: flex;
    gap: 16px;
    margin-bottom: 20px;
    align-items: flex-start;
}

.color-block {
    flex-shrink: 0;
}

.video-block {
    width: 260px;
    height: 260px;
    border-radius: 14px;
    overflow: hidden;
    background: #000;
}

.video-block video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* ===== MOBILE ===== */
@media (max-width: 768px) {

    /* Page padding — reduce left-right margin */
    .products-page {
        padding-left: 10px;
        padding-right: 10px;
        padding-top: 10px;
        margin-top: 6px;
    }

    /* Header stack */
    .products-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
    }

    .products-title h2 {
        font-size: 22px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .products-title .eyebrow {
        font-size: 12px;
        margin-bottom: 2px;
    }

    .products-title .subtitle {
        font-size: 12px;
        line-height: 1.4;
    }

    /* Filter row */
    .filter-controls {
        width: 100%;
        justify-content: space-between;
        gap: 8px;
    }

    .filter-group label {
        font-size: 10px;
    }

    #productSort {
        font-size: 12px;
        height: 34px;
    }

    .filter-pill {
        height: 34px;
        font-size: 12px;
    }

    /* Grid — 2 columns on mobile */
    .products-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
        margin-top: 12px;
    }

    /* Card */
    .prd-card {
        display: flex;
        flex-direction: column;
        height: auto;
    }

    /* Image */
    .prd-img-wrap {
        aspect-ratio: 1 / 1;
        flex-shrink: 0;
    }

    .prd-img-wrap img {
        width: 100%;
        height: 100%;
        object-fit: contain;
    }

    /* Info section — compact, NO extra bottom space */
    .prd-info {
        display: flex;
        flex-direction: column;
        gap: 3px;
        padding: 7px 8px;
        /* Critical: remove any bottom padding that causes extra space */
        padding-bottom: 8px;
    }

    .prd-info h4 {
        font-size: 13px;
        margin: 0;
        line-height: 1.2;
    }

    .prd-rating {
        font-size: 11px;
        margin: 0;
    }

    .prd-price-box {
        margin: 0;
        gap: 4px;
    }

    .prd-price-box span:first-child {
        font-size: 12px;
    }

    .prd-old-price {
        font-size: 10px;
    }

    /* Button — tight, no extra space below */
    .prd-cart-btn {
        margin-top: 5px;
        margin-bottom: 0;
        padding: 7px 6px;
        font-size: 11px;
        border-radius: 8px;
    }

    /* Video block */
    .color-row {
        flex-direction: column;
    }

    .video-block {
        width: 100%;
        height: 220px;
    }
}
</style>

<div class="products-page">
    <div class="products-header">
        <div class="products-title">
            <span class="eyebrow">Premium Collection</span>
            <h2>All Products</h2>
            <p class="subtitle">Shop curated products directly from the backend with real-time pricing, offers, and wishlist support.</p>
        </div>

        <div class="filter-controls">
            <div class="filter-group">
                <label for="productSort">Sort by</label>
                <select id="productSort">
                    <option value="featured">Featured</option>
                    <option value="price-asc">Price low to high</option>
                    <option value="price-desc">Price high to low</option>
                    <option value="discount">Top discount</option>
                </select>
            </div>
            <button id="filterSale" class="filter-pill" type="button">On Sale</button>
        </div>
    </div>

    <div id="allProducts" class="products-grid"></div>
</div>

<div id="sizeModal" class="size-modal hidden">
    <div class="size-glass">
        <h3>Select Size</h3>
        <div id="sizeList"></div>
        <button onclick="closeSizeModal()"
            style="margin-top:14px; width:100%; padding:10px; border:none;
                   border-radius:10px; background:#eee; cursor:pointer;">
            Cancel
        </button>
    </div>
</div>

<script>
let allProductsData = [];
let activeColorFilter = new URLSearchParams(window.location.search).get("color") || "";
let selectedProductId = null;
let selectedSizeId = null;

function getProductBaseId(product) {
    return product.product_id || product.id;
}

function getProductColorId(product) {
    return product.color_variant?.id || product.colors?.[0]?.id || null;
}

function getProductDetailUrl(product) {
    const productId = getProductBaseId(product);
    const colorId = getProductColorId(product);
    return colorId
        ? `/product/${productId}?color=${colorId}`
        : `/product/${productId}`;
}

/* ================= FILTER LOGIC ================= */
function applyProductFilters() {
    if (!allProductsData.length) return;

    const sortSelect = document.getElementById("productSort");
    const saleBtn = document.getElementById("filterSale");
    const desktopSearch = document.getElementById("searchInput");
    const mobileSearch = document.getElementById("mobileSearchInput");

    const sortValue = sortSelect ? sortSelect.value : "featured";
    const showSaleOnly = saleBtn ? saleBtn.classList.contains("active") : false;
    const searchQuery = (mobileSearch?.value || desktopSearch?.value || "").trim().toLowerCase();

    let products = [...allProductsData];

    if (searchQuery) {
        products = products.filter(product =>
            [
                product.name,
                product.color_variant?.name,
                ...(product.colors || []).map(color => color.name)
            ]
            .filter(Boolean)
            .join(" ")
            .toLowerCase()
            .includes(searchQuery)
        );
    }

    if (activeColorFilter) {
        products = products.filter(product =>
            product.colors?.some(color => String(color.id) === activeColorFilter)
        );
    }

    if (showSaleOnly) {
        products = products.filter(p => p.discount_percent > 0);
    }

    if (sortValue === "price-asc") {
        products.sort((a, b) => a.price - b.price);
    } else if (sortValue === "price-desc") {
        products.sort((a, b) => b.price - a.price);
    } else if (sortValue === "discount") {
        products.sort((a, b) => (b.discount_percent || 0) - (a.discount_percent || 0));
    }

    renderProductsGrid(products);
}

/* ================= CART ================= */
function toggleCart(productId, btn, colorId = null) {
    const isLoggedIn = document.querySelector(".avatar, .avatar-img");
    if (!isLoggedIn) {
        addToGuestCart(productId, colorId, null);
        if (btn) {
            btn.classList.add("active");
            btn.innerText = "✓ Added";
            setTimeout(() => { btn.innerText = "Add to Cart"; }, 1500);
        }
        return;
    }

    selectedProductId = productId;

    const isActive = btn.classList.contains("active");

    // REMOVE FLOW
    if (isActive) {
        const sizeId = btn.dataset.size || "";
        fetch(`/remove_cart/${productId}?color_id=${colorId || ""}&size_id=${sizeId}`)
            .then(res => res.json())
            .then(data => {
                btn.classList.remove("active");
                btn.innerText = "Add to Cart";
                updateCartCount();
            });
        return;
    }

    // ADD FLOW → OPEN SIZE MODAL
    selectedSizeId = null;
    openSizeModal(productId, colorId);
}

/* ================= OPEN SIZE MODAL ================= */
function openSizeModal(productId, colorId = null) {
    fetch(`/product/sizes/${productId}`)
        .then(res => res.json())
        .then(sizes => {
            const list = document.getElementById("sizeList");
            list.innerHTML = "";

            if (!Array.isArray(sizes) || sizes.length === 0) {
                list.innerHTML = "<p>No sizes available</p>";
                return;
            }

            sizes.forEach(s => {
                const btn = document.createElement("button");
                btn.innerText = s.label;

                btn.onclick = () => {
                    selectedSizeId = s.id;

                    document.querySelectorAll("#sizeList button")
                        .forEach(b => b.classList.remove("active"));
                    btn.classList.add("active");

                    fetch(`/cart/toggle/${productId}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ size_id: selectedSizeId, color_id: colorId })
                    })
                    .then(res => res.json())
                    .then(data => {
                        if (data.error === "size_required") {
                            alert("Size required");
                            return;
                        }

                        document.getElementById("cartCount").innerText = data.count;

                        const cartBtn = document.querySelector(
                            `.prd-cart-btn[data-id="${productId}"][data-color="${colorId || ""}"]`
                        );

                        if (cartBtn) {
                            cartBtn.classList.add("active");
                            cartBtn.innerText = "Remove from Cart";
                            cartBtn.dataset.size = selectedSizeId;
                        }

                        updateCartCount();
                        document.getElementById("sizeModal").classList.add("hidden");
                        selectedProductId = null;
                        selectedSizeId = null;
                    });
                };

                list.appendChild(btn);
            });

            document.getElementById("sizeModal").classList.remove("hidden");
        });
}

/* ================= CLOSE MODAL ================= */
function closeSizeModal() {
    document.getElementById("sizeModal").classList.add("hidden");
    selectedProductId = null;
    selectedSizeId = null;
}

/* ================= CHECK CART ================= */
function checkCart(productId, colorId = null) {
    const isLoggedIn = document.querySelector(".avatar, .avatar-img") !== null;
    if (!isLoggedIn) {
        const inCart = isInGuestCart(productId, colorId);
        return Promise.resolve({ in_cart: inCart, size_id: null });
    }
    return fetch(`/cart/check/${productId}${colorId ? `?color_id=${colorId}` : ""}`)
        .then(res => res.json());
}

function updateCartCount() {
    fetch("/get_counts")
        .then(res => res.json())
        .then(data => {
            document.getElementById("cartCount").innerText = data.cart;
        });
}

/* ================= RENDER PRODUCTS ================= */
function renderProductsGrid(products) {
    const container = document.getElementById("allProducts");
    if (!container) return;

    container.innerHTML = "";

    if (!products.length) {
        container.innerHTML = "<p>No products found</p>";
        return;
    }

    products.forEach(product => {
        const productId = getProductBaseId(product);
        const variantColor = product.color_variant || product.colors?.[0] || null;
        const colorId = variantColor?.id || null;
        const defaultImage = product.images?.[0] || "/static/images/default.png";

        const colorsHTML = variantColor
            ? `<div class="prd-color-row">
                <span class="color-dot active"
                    style="background:${variantColor.code}"
                    title="${variantColor.name}"
                    data-color="${variantColor.id}">
                </span>
               </div>`
            : "";

        const discountHTML = product.discount_percent > 0
            ? `<span class="discount-badge">-${product.discount_percent}%</span>`
            : "";

        const oldPriceHTML = product.original_price
            ? `<span class="prd-old-price">₹${product.original_price}</span>`
            : "";

        const ratingHTML = product.rating
            ? `<div class="prd-rating">⭐ ${product.rating}</div>`
            : "";

        const div = document.createElement("div");
        div.className = "prd-card";

        div.innerHTML = `
            <div class="prd-img-wrap">
                ${discountHTML}
                <button class="prd-wishlist-btn">♡</button>
                <img class="product-img" src="${defaultImage}">
            </div>
            <div class="prd-info">
                <h4>${product.name}</h4>
                ${ratingHTML}
                <div class="prd-price-box">
                    <span>₹${product.price}</span>
                    ${oldPriceHTML}
                </div>
                ${colorsHTML}
                <button class="prd-cart-btn" data-id="${productId}" data-color="${colorId || ""}">Add to Cart</button>
            </div>
        `;

        const imgEl     = div.querySelector(".product-img");
        const wishlistBtn = div.querySelector(".prd-wishlist-btn");
        const cartBtn   = div.querySelector(".prd-cart-btn");

        const isLoggedIn = document.querySelector(".avatar, .avatar-img") !== null;

        /* WISHLIST INITIAL STATE */
        if (isLoggedIn) {
            checkWishlist(productId, colorId).then(inWishlist => {
                if (inWishlist) {
                    wishlistBtn.classList.add("active");
                    wishlistBtn.innerHTML = "❤️";
                }
            });
        } else {
            if (isInGuestWishlist(productId, colorId)) {
                wishlistBtn.classList.add("active");
                wishlistBtn.innerHTML = "❤️";
            }
        }

        /* WISHLIST CLICK */
        wishlistBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            addToWishlist(productId, wishlistBtn, colorId);
        });

        /* CART CLICK */
        cartBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            toggleCart(productId, cartBtn, colorId);
        });

        checkCart(productId, colorId).then(data => {
            if (data.in_cart) {
                cartBtn.classList.add("active");
                cartBtn.innerText = "Remove from Cart";
                cartBtn.dataset.size = data.size_id || "";
            }
        });

        /* COLOR HOVER */
        div.querySelectorAll(".color-dot").forEach(dot => {
            dot.addEventListener("mouseenter", () => {
                const cId = dot.dataset.color;
                const img = product.color_images?.[cId];
                if (img?.length) imgEl.src = img[0];
            });

            dot.addEventListener("mouseleave", () => {
                imgEl.src = defaultImage;
            });

            dot.addEventListener("click", (e) => {
                e.stopPropagation();
                window.location.href = `/product/${productId}?color=${dot.dataset.color}`;
            });
        });

        /* CARD CLICK */
        div.addEventListener("click", (e) => {
            if (
                e.target.closest(".prd-cart-btn") ||
                e.target.closest(".prd-wishlist-btn")
            ) return;
            window.location.href = getProductDetailUrl(product);
        });

        container.appendChild(div);
    });
}

/* ================= FILTER EVENTS ================= */
function setupProductFilters() {
    const sortSelect = document.getElementById("productSort");
    const saleBtn = document.getElementById("filterSale");

    sortSelect?.addEventListener("change", applyProductFilters);
    document.getElementById("searchInput")?.addEventListener("input", applyProductFilters);
    document.getElementById("mobileSearchInput")?.addEventListener("input", applyProductFilters);

    saleBtn?.addEventListener("click", () => {
        saleBtn.classList.toggle("active");
        applyProductFilters();
    });
}

/* ================= LOAD PRODUCTS ================= */
function loadAllProducts() {
    fetch("/products")
        .then(res => res.json())
        .then(data => {
            allProductsData = Array.isArray(data) ? data : [];
            setupProductFilters();
            applyProductFilters();
        })
        .catch(err => console.error("Product load error:", err));
}

/* INIT */
document.addEventListener("DOMContentLoaded", loadAllProducts);
</script>
{% endblock %}

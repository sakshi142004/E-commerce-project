{% extends "base.html" %}

{% block title %}Reset Password | Belt Purse{% endblock %}

{% block content %}
<style>
    .reset-password-page {
        min-height: calc(100vh - 70px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 64px 16px;
        background: #faf7f2;
    }

    .reset-password-card {
        width: min(100%, 430px);
        background: linear-gradient(180deg, rgba(6, 35, 32, 0.98), rgba(10, 92, 86, 0.94));
        border: 1px solid rgba(10, 92, 86, 0.28);
        border-radius: 24px;
        padding: 34px 30px;
        color: #eef7f4;
        box-shadow: 0 28px 80px rgba(8, 62, 58, 0.22);
    }

    .reset-password-card h1 {
        margin: 0 0 10px;
        font-size: 26px;
        color: #eef7f4;
        text-align: center;
    }

    .reset-password-card p {
        color: rgba(238, 247, 244, 0.72);
        font-size: 14px;
        text-align: center;
    }

    .reset-password-card input {
        width: 100%;
        padding: 14px 16px;
        margin-bottom: 14px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.06);
        color: #eef7f4;
        border-radius: 12px;
        outline: none;
        font-size: 14px;
    }

    .reset-password-card input:focus {
        background: rgba(255, 255, 255, 0.12);
        border-color: rgba(255, 255, 255, 0.28);
    }

    .reset-error {
        margin: 0 0 14px;
        color: #f4b684 !important;
    }

    .reset-password-card button,
    .reset-password-card a.reset-login-link {
        width: 100%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 14px 18px;
        border: 0;
        border-radius: 999px;
        background: #0A5C56;
        color: #ffffff;
        text-decoration: none;
        cursor: pointer;
        font-size: 14px;
    }

    @media (max-width: 500px) {
        .reset-password-page {
            padding: 32px 12px;
        }

        .reset-password-card {
            padding: 24px 16px;
            border-radius: 18px;
        }

        .reset-password-card h1 {
            font-size: 22px;
        }
    }
</style>

<main class="reset-password-page">
    <section class="reset-password-card">
        <h1>Reset Password</h1>
        {% if error %}
            <p class="reset-error">{{ error }}</p>
        {% else %}
            <p>Create a new password for your Belt Purse account.</p>
        {% endif %}

        {% if token_valid %}
            <form method="POST" action="{{ url_for('reset_password', token=token) }}">
                <input type="password" name="new_password" placeholder="New Password" required>
                <input type="password" name="confirm_password" placeholder="Confirm Password" required>
                <button type="submit">Update Password</button>
            </form>
        {% else %}
            <a href="/?show_login=1" class="reset-login-link">Back to Login</a>
        {% endif %}
    </section>
</main>
{% endblock %}
